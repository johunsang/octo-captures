// ═══════ Scripted Cursor ═══════
function getScriptedCursorAt(ms) {
  if (!scriptWaypoints.length) return { x: 0.5, y: 0.5, action: null };
  const sec = ms / 1000;
  // Find surrounding waypoints
  let lo = 0, hi = scriptWaypoints.length - 1;
  while (lo < hi) { const m = (lo + hi) >> 1; if (scriptWaypoints[m].t < sec) lo = m + 1; else hi = m; }
  if (lo === 0) return { x: scriptWaypoints[0].x, y: scriptWaypoints[0].y, action: scriptWaypoints[0].action };
  const a = scriptWaypoints[lo - 1], b = scriptWaypoints[lo];
  // Handle wait/duration
  if (a.duration > 0 && sec < a.t + a.duration) {
    return { x: a.x, y: a.y, action: a.action, progress: (sec - a.t) / a.duration };
  }
  const startT = a.t + (a.duration || 0);
  const endT = b.t;
  if (startT >= endT) return { x: b.x, y: b.y, action: b.action };
  const rawP = Math.max(0, Math.min(1, (sec - startT) / (endT - startT)));
  // Ease-in-out for smooth movement
  const t = rawP < 0.5 ? 2 * rawP * rawP : 1 - Math.pow(-2 * rawP + 2, 2) / 2;
  // Catmull-Rom control points for smooth curves
  const prev = lo >= 2 ? scriptWaypoints[lo - 2] : a;
  const next = lo < scriptWaypoints.length - 1 ? scriptWaypoints[lo + 1] : b;
  const cp1x = a.x + (b.x - prev.x) / 6, cp1y = a.y + (b.y - prev.y) / 6;
  const cp2x = b.x - (next.x - a.x) / 6, cp2y = b.y - (next.y - a.y) / 6;
  const u = 1 - t;
  const x = u*u*u*a.x + 3*u*u*t*cp1x + 3*u*t*t*cp2x + t*t*t*b.x;
  const y = u*u*u*a.y + 3*u*u*t*cp1y + 3*u*t*t*cp2y + t*t*t*b.y;
  return { x, y, action: rawP > 0.95 ? b.action : 'move', progress: rawP };
}

// ═══════ Cursor Helpers ═══════
function getCursorAt(ms) {
  if (scriptMode && scriptWaypoints.length > 0) return getScriptedCursorAt(ms);
  if (!cursorPositions.length) return {x:0.5,y:0.5};
  let lo=0,hi=cursorPositions.length-1;
  while(lo<hi){const m=(lo+hi)>>1;cursorPositions[m].t<ms?lo=m+1:hi=m;}
  if(lo===0) return cursorPositions[0];
  const a=cursorPositions[lo-1],b=cursorPositions[lo];
  const r=b.t-a.t; if(!r) return b;
  const t=(ms-a.t)/r;
  return {x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t};
}
let lastMovingTime = 0;
function cursorMoving(ms) {
  const w=1200,n=8; let d=0;
  for(let i=0;i<n;i++){const t1=ms-w+(w/n)*i,t2=ms-w+(w/n)*(i+1);const p1=getCursorAt(t1),p2=getCursorAt(t2);d+=Math.hypot(p2.x-p1.x,p2.y-p1.y);}
  if(d/n>S.sensitivity){lastMovingTime=ms;return true;}
  return (ms-lastMovingTime)<1500;
}

// ═══════ Cubic Bezier Easing ═══════
function cubicBezier(t, p1x, p1y, p2x, p2y) {
  const cx=3*p1x, bx=3*(p2x-p1x)-cx, ax=1-cx-bx;
  const cy=3*p1y, by=3*(p2y-p1y)-cy, ay=1-cy-by;
  function sX(t){return((ax*t+bx)*t+cx)*t;}
  function sY(t){return((ay*t+by)*t+cy)*t;}
  function sDX(t){return(3*ax*t+2*bx)*t+cx;}
  let g=t;
  for(let i=0;i<8;i++){const e=sX(g)-t;if(Math.abs(e)<1e-6)break;const d=sDX(g);if(Math.abs(d)<1e-6)break;g-=e/d;}
  g=Math.max(0,Math.min(1,g));
  return sY(g);
}

const easePresets = {
  linear:    [0, 0, 1, 1],
  easeIn:    [0.42, 0, 1, 1],
  easeOut:   [0, 0, 0.58, 1],
  easeInOut: [0.42, 0, 0.58, 1],
};

function getEasedValue(progress) {
  const p = easePresets[S.easePreset] || easePresets.easeOut;
  return cubicBezier(Math.max(0, Math.min(1, progress)), p[0], p[1], p[2], p[3]);
}

// ═══════ Zoom Transition State ═══════
let zoomTransition = {
  startTime: 0, duration: 600,
  fromScale: 1, toScale: 1,
  fromX: 0.5, fromY: 0.5, toX: 0.5, toY: 0.5,
  active: false,
};

function startZoomTransition(ms, toScale, toX, toY) {
  // Only start a new bezier transition for significant scale changes (zoom in/out)
  const scaleChanged = Math.abs(toScale - zoomTransition.toScale) > 0.05;
  if (scaleChanged) {
    zoomTransition.startTime = ms;
    zoomTransition.duration = Math.max(200, S.zoomSmooth * 20000);
    zoomTransition.fromScale = curScale;
    zoomTransition.toScale = toScale;
    zoomTransition.active = true;
  }
  // Always update target position for EMA tracking
  zoomTransition.toX = toX;
  zoomTransition.toY = toY;
  if (!scaleChanged && !zoomTransition.active) {
    zoomTransition.toScale = toScale;
  }
}

function applyZoomTransition(ms) {
  // Scale: use bezier easing if transition active, otherwise EMA
  if (zoomTransition.active) {
    const elapsed = ms - zoomTransition.startTime;
    const progress = Math.min(1, elapsed / zoomTransition.duration);
    const eased = getEasedValue(progress);
    curScale = zoomTransition.fromScale + (zoomTransition.toScale - zoomTransition.fromScale) * eased;
    if (progress >= 1) zoomTransition.active = false;
  } else {
    // EMA fallback for smooth scale tracking
    curScale += (zoomTransition.toScale - curScale) * S.zoomSmooth * 0.3;
  }
  // Position: always use EMA for smooth continuous cursor tracking
  const posFactor = Math.max(S.zoomSmooth * 5, 0.08);
  curX += (zoomTransition.toX - curX) * posFactor;
  curY += (zoomTransition.toY - curY) * posFactor;
}

// ═══════ Velocity-based Zoom ═══════
function getCursorVelocity(ms) {
  const w=300, n=6; let totalDist=0;
  for(let i=0;i<n;i++){
    const t1=ms-w+(w/n)*i, t2=ms-w+(w/n)*(i+1);
    const p1=getCursorAt(t1), p2=getCursorAt(t2);
    totalDist+=Math.hypot(p2.x-p1.x, p2.y-p1.y);
  }
  return totalDist/(w/1000); // normalized units per second
}

function getVelocityZoomLevel(ms) {
  const vel=getCursorVelocity(ms);
  // maxVel calibrated so typical fast cursor movement (~0.5 norm-units/sec) maps to 1.0
  const maxVel = 0.8;
  const t=Math.min(1, vel/maxVel);
  // Slow=more zoom, fast=less zoom (smooth curve)
  // At vel=0: full zoomLevel. At vel=maxVel: still 70% of zoomLevel
  return 1+(S.zoomLevel-1)*Math.max(0.3, 1-t*0.7);
}

// ═══════ Dwell Area Detection ═══════
function getCursorDwellArea(ms) {
  const dwellWindow=500, samples=10;
  let minX=1,maxX=0,minY=1,maxY=0;
  for(let i=0;i<samples;i++){
    const t=ms-dwellWindow+(dwellWindow/samples)*i;
    const p=getCursorAt(t);
    minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);
    minY=Math.min(minY,p.y);maxY=Math.max(maxY,p.y);
  }
  const spread=Math.hypot(maxX-minX, maxY-minY);
  if(spread<0.05) return {x:(minX+maxX)/2, y:(minY+maxY)/2, dwelling:true};
  return {dwelling:false, x:0.5, y:0.5};
}

// ═══════ Movement Prediction ═══════
function predictCursorDirection(ms) {
  const dt=100;
  const p1=getCursorAt(ms-dt), p2=getCursorAt(ms);
  const vx=(p2.x-p1.x)/dt*200; // extrapolate 200ms ahead
  const vy=(p2.y-p1.y)/dt*200;
  return {x:Math.max(0,Math.min(1,p2.x+vx)), y:Math.max(0,Math.min(1,p2.y+vy))};
}

// ═══════ Click Zoom ═══════
let cursorClicks = [];
let clicksEstimated = false;

function estimateClicksFromCursorData() {
  // Heuristic: detect "sudden stops" as likely click events
  // A click typically shows: movement → sudden stop (< 50ms) → slight movement
  if (!cursorPositions.length || cursorClicks.length > 0) return;
  const minGap = 300; // minimum ms between detected clicks
  let lastClickT = -minGap;
  for (let i = 5; i < cursorPositions.length - 3; i++) {
    const t = cursorPositions[i].t;
    if (t - lastClickT < minGap) continue;
    // Check velocity before (moving) and at this point (stopped)
    const p0 = cursorPositions[i - 3], p1 = cursorPositions[i - 1], p2 = cursorPositions[i], p3 = cursorPositions[i + 2];
    if (!p0 || !p1 || !p2 || !p3) continue;
    const velBefore = Math.hypot(p1.x - p0.x, p1.y - p0.y) / Math.max(1, p1.t - p0.t);
    const velAt = Math.hypot(p2.x - p1.x, p2.y - p1.y) / Math.max(1, p2.t - p1.t);
    const velAfter = Math.hypot(p3.x - p2.x, p3.y - p2.y) / Math.max(1, p3.t - p2.t);
    // Sudden deceleration pattern: was moving, then stopped, optionally moves again
    if (velBefore > 0.00005 && velAt < 0.00001 && (velAfter > 0.00002 || velAt < 0.000005)) {
      cursorClicks.push({ t: t, x: p2.x, y: p2.y });
      lastClickT = t;
    }
  }
  clicksEstimated = true;
}

function getRecentClick(ms, windowMs) {
  windowMs = windowMs || 1500;
  for(let i=cursorClicks.length-1;i>=0;i--){
    const c=cursorClicks[i];
    if(c.t<=ms && ms-c.t<windowMs) return c;
    if(c.t<ms-windowMs) break;
  }
  return null;
}

// ═══════ Unified Zoom Computation ═══════
function computeZoomTarget(ms) {
  let ts=1, tx=0.5, ty=0.5;

  // Keyframe override
  const kf = getKfAt(ms/1000);
  if (kf && zoomKeyframes.length) {
    return { scale: kf.zoom, x: kf.x, y: kf.y };
  }

  if (!S.autoZoom || !cursorPositions.length) return { scale: 1, x: 0.5, y: 0.5 };

  const c = getCursorAt(ms);
  tx = c.x; ty = c.y;

  // Click zoom (highest priority)
  const recentClick = S.clickZoom ? getRecentClick(ms, 1500) : null;
  if (recentClick) {
    ts = S.zoomLevel * 1.2;
    tx = recentClick.x;
    ty = recentClick.y;
  } else if (cursorMoving(ms)) {
    // Velocity-based zoom
    ts = S.velocityZoom ? getVelocityZoomLevel(ms) : S.zoomLevel;
  } else if (S.dwellZoom) {
    // Dwell area detection
    const dwell = getCursorDwellArea(ms);
    if (dwell.dwelling) {
      ts = S.zoomLevel * 0.8; // slight zoom on dwell area
      tx = dwell.x; ty = dwell.y;
    }
  }

  // Movement prediction (blend)
  if (S.predictPan && cursorMoving(ms) && ts > 1.05) {
    const pred = predictCursorDirection(ms);
    tx = tx * 0.7 + pred.x * 0.3;
    ty = ty * 0.7 + pred.y * 0.3;
  }

  return { scale: ts, x: tx, y: ty };
}

// ═══════ Subtitle Helpers ═══════
function getSubAnim(sub,t){const d=sub.end-sub.start,e=t-sub.start,r=sub.end-t;const fi=Math.min(1,e/Math.min(0.3,d*0.15)),fo=Math.min(1,r/Math.min(0.3,d*0.15));return{fi,fo,p:Math.min(1,e/d),e};}
function rrect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

// ═══════ Render ═══════
function render() {
  requestAnimationFrame(render);
  const vw=video.videoWidth,vh=video.videoHeight;
  if(!vw||!vh) return;
  const dpr=window.devicePixelRatio,W=canvas.width/dpr,H=canvas.height/dpr;
  const ms=video.currentTime*1000;

  // Zoom (bezier easing + velocity/dwell/click/prediction)
  const zTarget = computeZoomTarget(ms);
  startZoomTransition(ms, zTarget.scale, zTarget.x, zTarget.y);
  applyZoomTransition(ms);

  const sc=curScale,pad=S.padding,rad=S.radius;
  const sW=vw/sc,sH=vh/sc;
  let sX=curX*vw-sW/2,sY=curY*vh-sH/2;
  sX=Math.max(0,Math.min(vw-sW,sX));sY=Math.max(0,Math.min(vh-sH,sY));

  const iW=W-pad*2,iH=H-pad*2,va=vw/vh,ia=iW/iH;
  let rW,rH,oX,oY;
  if(va>ia){rW=iW;rH=rW/va;}else{rH=iH;rW=rH*va;}
  oX=pad+(iW-rW)/2;oY=pad+(iH-rH)/2;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();ctx.scale(dpr,dpr);

  // BG
  if(selectedBg!=='none'&&pad>0){const c=bgColors[selectedBg];if(c){const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,c[0]);g.addColorStop(1,c[1]);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}}

  // Shadow
  if(S.shadow&&pad>0){ctx.save();ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=30;ctx.shadowOffsetY=8;ctx.fillStyle='#000';rrect(ctx,oX,oY,rW,rH,rad);ctx.fill();ctx.restore();}

  // Video
  ctx.save();rrect(ctx,oX,oY,rW,rH,rad);ctx.clip();
  // Build filter string combining manual settings + filter preset
  const fp = filterPresets[activeFilter] || filterPresets.none;
  const effB = S.brightness * fp.brightness;
  const effC = S.contrast * fp.contrast;
  const effS = S.saturate * fp.saturate;
  let filterStr = `brightness(${effB}) contrast(${effC}) saturate(${effS})`;
  if (fp.hueRotate) filterStr += ` hue-rotate(${fp.hueRotate}deg)`;
  if (fp.sepia) filterStr += ` sepia(${fp.sepia})`;
  if (FX.blur > 0) filterStr += ` blur(${FX.blur}px)`;
  ctx.filter = filterStr;

  // Chromatic aberration - draw offset RGB channels
  if (FX.chromatic > 0) {
    const ca = FX.chromatic * (rW / 800);
    ctx.globalCompositeOperation = 'source-over';
    ctx.drawImage(video, sX, sY, sW, sH, oX, oY, rW, rH);
    ctx.filter = 'none';
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.5;
    ctx.filter = filterStr + ' saturate(0) brightness(0.8)';
    ctx.drawImage(video, sX, sY, sW, sH, oX - ca, oY, rW, rH); // Red shift
    ctx.drawImage(video, sX, sY, sW, sH, oX + ca, oY, rW, rH); // Blue shift
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
    ctx.filter = 'none';
  } else {
    ctx.drawImage(video, sX, sY, sW, sH, oX, oY, rW, rH);
    ctx.filter = 'none';
  }

  // Filter color overlay
  if (fp.overlay) { ctx.fillStyle = fp.overlay; ctx.fillRect(oX, oY, rW, rH); }

  // Temperature overlay
  if (FX.temperature !== 0) {
    const t2 = FX.temperature;
    ctx.fillStyle = t2 > 0 ? `rgba(255,140,0,${Math.abs(t2)/400})` : `rgba(0,100,255,${Math.abs(t2)/400})`;
    ctx.fillRect(oX, oY, rW, rH);
  }

  // Tint overlay
  if (FX.tint !== 0) {
    const ti = FX.tint;
    ctx.fillStyle = ti > 0 ? `rgba(200,0,200,${Math.abs(ti)/500})` : `rgba(0,200,0,${Math.abs(ti)/500})`;
    ctx.fillRect(oX, oY, rW, rH);
  }

  // Highlights (brighten light areas)
  if (FX.highlights > 0) {
    ctx.fillStyle = `rgba(255,255,255,${FX.highlights/500})`;
    ctx.fillRect(oX, oY, rW, rH);
  } else if (FX.highlights < 0) {
    ctx.fillStyle = `rgba(0,0,0,${Math.abs(FX.highlights)/500})`;
    ctx.fillRect(oX, oY, rW, rH);
  }

  // Shadows
  if (FX.shadows > 0) {
    ctx.fillStyle = `rgba(255,255,255,${FX.shadows/600})`;
    ctx.fillRect(oX, oY, rW, rH);
  } else if (FX.shadows < 0) {
    ctx.fillStyle = `rgba(0,0,0,${Math.abs(FX.shadows)/400})`;
    ctx.fillRect(oX, oY, rW, rH);
  }

  // Fade (lifted blacks)
  if (FX.fadeAmount > 0) {
    ctx.fillStyle = `rgba(128,128,128,${FX.fadeAmount/200})`;
    ctx.fillRect(oX, oY, rW, rH);
  }

  // Vignette
  if (FX.vignette > 0) {
    const vcx2 = oX + rW/2, vcy2 = oY + rH/2;
    const vr2 = Math.max(rW, rH) * 0.7;
    const vg2 = ctx.createRadialGradient(vcx2, vcy2, vr2 * 0.3, vcx2, vcy2, vr2);
    vg2.addColorStop(0, 'rgba(0,0,0,0)');
    vg2.addColorStop(1, `rgba(0,0,0,${FX.vignette/100})`);
    ctx.fillStyle = vg2;
    ctx.fillRect(oX, oY, rW, rH);
  }

  // Glitch effect
  if (FX.glitch && Math.random() < 0.3) {
    const sliceH = rH * (0.02 + Math.random() * 0.08);
    const sliceY = oY + Math.random() * (rH - sliceH);
    const shift = (Math.random() - 0.5) * rW * 0.1;
    ctx.drawImage(canvas, oX * dpr, sliceY * dpr, rW * dpr, sliceH * dpr, oX + shift, sliceY, rW, sliceH);
  }

  // Scanlines
  if (FX.scanlines) {
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    for (let sy2 = oY; sy2 < oY + rH; sy2 += 3) {
      ctx.fillRect(oX, sy2, rW, 1);
    }
  }

  // ── Screen Effects ──

  // CRT Monitor effect (curved scanlines + green tint + barrel distortion simulation)
  if (FX.crt) {
    // Horizontal scanlines (thicker, with phosphor glow)
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    for (let cy = oY; cy < oY + rH; cy += 4) { ctx.fillRect(oX, cy, rW, 2); }
    // RGB phosphor dots
    ctx.fillStyle = 'rgba(0,255,0,0.03)';
    ctx.fillRect(oX, oY, rW, rH);
    // Edge darkening (barrel distortion simulation)
    const crtG = ctx.createRadialGradient(oX+rW/2, oY+rH/2, Math.min(rW,rH)*0.3, oX+rW/2, oY+rH/2, Math.max(rW,rH)*0.7);
    crtG.addColorStop(0, 'rgba(0,0,0,0)');
    crtG.addColorStop(0.7, 'rgba(0,0,0,0)');
    crtG.addColorStop(1, 'rgba(0,0,0,0.4)');
    ctx.fillStyle = crtG; ctx.fillRect(oX, oY, rW, rH);
    // Flicker
    if (Math.random() < 0.05) { ctx.fillStyle = 'rgba(255,255,255,0.03)'; ctx.fillRect(oX, oY, rW, rH); }
  }

  // Pixelate effect
  if (FX.pixelate > 1) {
    const pxSize = Math.max(2, Math.round(FX.pixelate));
    const tmpCvs = document.createElement('canvas');
    const tmpCtx = tmpCvs.getContext('2d');
    const smallW = Math.ceil(rW / pxSize), smallH = Math.ceil(rH / pxSize);
    tmpCvs.width = smallW; tmpCvs.height = smallH;
    tmpCtx.drawImage(canvas, oX * dpr, oY * dpr, rW * dpr, rH * dpr, 0, 0, smallW, smallH);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(tmpCvs, 0, 0, smallW, smallH, oX, oY, rW, rH);
    ctx.imageSmoothingEnabled = true;
  }

  // RGB Split effect (different from chromatic - intentional aesthetic)
  if (FX.rgbSplit > 0) {
    const rs = FX.rgbSplit * (rW / 500);
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = 0.7;
    // Red channel shift
    ctx.drawImage(canvas, oX * dpr, oY * dpr, rW * dpr, rH * dpr, oX - rs, oY + rs * 0.5, rW, rH);
    // Blue channel shift
    ctx.drawImage(canvas, oX * dpr, oY * dpr, rW * dpr, rH * dpr, oX + rs, oY - rs * 0.5, rW, rH);
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Mirror effect (horizontal flip right half)
  if (FX.mirror) {
    ctx.save();
    ctx.translate(oX + rW, oY);
    ctx.scale(-1, 1);
    ctx.drawImage(canvas, oX * dpr, oY * dpr, (rW/2) * dpr, rH * dpr, 0, 0, rW/2, rH);
    ctx.restore();
  }

  // Invert colors
  if (FX.invert) {
    ctx.save();
    ctx.globalCompositeOperation = 'difference';
    ctx.fillStyle = 'white';
    ctx.fillRect(oX, oY, rW, rH);
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();
  }

  // Shake effect
  if (FX.shake > 0 && !video.paused) {
    const shakeAmt = FX.shake * 0.5;
    const shX = (Math.random() - 0.5) * shakeAmt;
    const shY = (Math.random() - 0.5) * shakeAmt;
    ctx.save();
    ctx.drawImage(canvas, oX * dpr, oY * dpr, rW * dpr, rH * dpr, oX + shX, oY + shY, rW, rH);
    ctx.restore();
  }

  // Flash effect (periodic bright flash)
  if (FX.flash > 0) {
    const flashPhase = (ms / 1000 * 2) % 1; // 2 flashes per second
    if (flashPhase < 0.05) {
      ctx.fillStyle = `rgba(255,255,255,${FX.flash / 150})`;
      ctx.fillRect(oX, oY, rW, rH);
    }
  }

  // Zoom pulse effect
  if (FX.zoom_pulse > 0 && !video.paused) {
    const pulse = Math.sin(ms / 300) * FX.zoom_pulse * 0.002;
    if (Math.abs(pulse) > 0.001) {
      ctx.save();
      ctx.translate(oX + rW/2, oY + rH/2);
      ctx.scale(1 + pulse, 1 + pulse);
      ctx.translate(-(oX + rW/2), -(oY + rH/2));
      ctx.drawImage(canvas, oX * dpr, oY * dpr, rW * dpr, rH * dpr, oX, oY, rW, rH);
      ctx.restore();
    }
  }

  // Noise (static) effect
  if (FX.noise > 0) {
    const noiseAlpha = FX.noise / 500;
    if (!grainCanvas) { grainCanvas = document.createElement('canvas'); grainCtx = grainCanvas.getContext('2d'); }
    const nw = Math.round(rW / 3), nh = Math.round(rH / 3);
    if (grainCanvas.width !== nw || grainCanvas.height !== nh) { grainCanvas.width = nw; grainCanvas.height = nh; }
    const nid = grainCtx.createImageData(nw, nh); const nd = nid.data;
    for (let ni = 0; ni < nd.length; ni += 4) {
      const nv = Math.random() > 0.5 ? 255 : 0;
      nd[ni] = nd[ni+1] = nd[ni+2] = nv; nd[ni+3] = 255;
    }
    grainCtx.putImageData(nid, 0, 0);
    ctx.save(); ctx.globalAlpha = noiseAlpha;
    ctx.drawImage(grainCanvas, oX, oY, rW, rH);
    ctx.restore();
  }

  // Dream effect (soft glow + desaturation)
  if (FX.dream > 0) {
    ctx.save();
    ctx.globalAlpha = FX.dream / 200;
    ctx.filter = `blur(${Math.min(8, FX.dream / 10)}px) brightness(1.2)`;
    ctx.drawImage(canvas, oX * dpr, oY * dpr, rW * dpr, rH * dpr, oX, oY, rW, rH);
    ctx.filter = 'none';
    ctx.globalAlpha = FX.dream / 400;
    ctx.fillStyle = 'rgba(200,180,255,0.5)';
    ctx.fillRect(oX, oY, rW, rH);
    ctx.restore();
  }

  // Letterbox (cinematic bars)
  if (FX.letterbox > 0) {
    const barH = rH * (FX.letterbox / 100);
    ctx.fillStyle = '#000000';
    ctx.fillRect(oX, oY, rW, barH);
    ctx.fillRect(oX, oY + rH - barH, rW, barH);
  }

  // Emboss effect
  if (FX.emboss) {
    ctx.save();
    ctx.globalCompositeOperation = 'overlay';
    ctx.globalAlpha = 0.5;
    ctx.drawImage(canvas, (oX + 1) * dpr, (oY + 1) * dpr, rW * dpr, rH * dpr, oX, oY, rW, rH);
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();
  }

  // Highlight effect - darken edges, brighten around cursor
  if(S.highlight&&sc>1.05&&cursorPositions.length>0){
    const cx2=oX+((curX*vw-sX)/sW)*rW;
    const cy2=oY+((curY*vh-sY)/sH)*rH;
    const strength=S.highlightStrength*Math.min(1,sc-1);
    const spotR=Math.min(rW,rH)*0.35;
    const grad=ctx.createRadialGradient(cx2,cy2,spotR*0.3,cx2,cy2,spotR*1.2);
    grad.addColorStop(0,`rgba(0,0,0,0)`);
    grad.addColorStop(0.6,`rgba(0,0,0,${strength*0.3})`);
    grad.addColorStop(1,`rgba(0,0,0,${strength})`);
    ctx.fillStyle=grad;
    ctx.fillRect(oX,oY,rW,rH);
  }

  // ── Cursor rendering ──
  if (S.cursorVisible && cursorPositions.length > 0) {
    const cp = getCursorAt(ms);
    const cx2 = oX + ((cp.x * vw - sX) / sW) * rW;
    const cy2 = oY + ((cp.y * vh - sY) / sH) * rH;
    // Only draw if cursor is within the visible frame
    if (cx2 >= oX && cx2 <= oX + rW && cy2 >= oY && cy2 <= oY + rH) {
      const cSize = 20 * S.cursorSize * (rW / 800);
      ctx.save();
      ctx.translate(cx2, cy2);
      // macOS-style arrow cursor
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, cSize * 1.4);
      ctx.lineTo(cSize * 0.35, cSize * 1.05);
      ctx.lineTo(cSize * 0.75, cSize * 1.65);
      ctx.lineTo(cSize * 0.95, cSize * 1.5);
      ctx.lineTo(cSize * 0.55, cSize * 0.9);
      ctx.lineTo(cSize * 1.0, cSize * 0.85);
      ctx.closePath();
      // Shadow
      ctx.shadowColor = 'rgba(0,0,0,0.4)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetX = 1;
      ctx.shadowOffsetY = 1;
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#000000';
      ctx.lineWidth = Math.max(1, cSize * 0.07);
      ctx.stroke();
      ctx.restore();

      // Script mode: click ripple & action animations
      if (scriptMode && scriptWaypoints.length > 0) {
        const curResult = getScriptedCursorAt(ms);
        // Click ripple
        if (curResult.action === 'click' || curResult.action === 'dblclick') {
          const nearWp = scriptWaypoints.find(w => Math.abs(w.t * 1000 - ms) < 400);
          if (nearWp) {
            const elapsed = ms - nearWp.t * 1000;
            if (elapsed >= 0 && elapsed < 400) {
              const rp = elapsed / 400;
              ctx.beginPath();
              ctx.arc(cx2, cy2, 30 * rp * S.cursorSize, 0, Math.PI * 2);
              ctx.strokeStyle = `rgba(124,111,245,${(1 - rp) * 0.8})`;
              ctx.lineWidth = 2; ctx.stroke();
              if (curResult.action === 'dblclick' && elapsed > 150) {
                ctx.beginPath();
                ctx.arc(cx2, cy2, 30 * ((elapsed - 150) / 400) * S.cursorSize, 0, Math.PI * 2);
                ctx.stroke();
              }
            }
          }
        }
        // Wait pulse
        if (curResult.action === 'wait' && curResult.progress != null) {
          const pulse = 0.5 + 0.5 * Math.sin((curResult.progress || 0) * Math.PI * 4);
          ctx.beginPath(); ctx.arc(cx2, cy2, 8 + pulse * 4, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(80,208,160,${0.3 + pulse * 0.3})`; ctx.lineWidth = 1.5; ctx.stroke();
        }
      }
      // Recorded click ripple (non-script mode)
      if (!scriptMode && cursorClicks.length > 0) {
        const clickWindowMs = 500;
        for (const ck of cursorClicks) {
          const elapsed = ms - ck.t;
          if (elapsed >= 0 && elapsed < clickWindowMs) {
            const ckx = oX + ((ck.x * vw - sX) / sW) * rW;
            const cky = oY + ((ck.y * vh - sY) / sH) * rH;
            if (ckx >= oX && ckx <= oX + rW && cky >= oY && cky <= oY + rH) {
              const rp = elapsed / clickWindowMs;
              // Outer ripple
              ctx.beginPath();
              ctx.arc(ckx, cky, 35 * rp * S.cursorSize, 0, Math.PI * 2);
              ctx.strokeStyle = `rgba(124,111,245,${(1 - rp) * 0.7})`;
              ctx.lineWidth = 2.5; ctx.stroke();
              // Inner ripple
              ctx.beginPath();
              ctx.arc(ckx, cky, 18 * rp * S.cursorSize, 0, Math.PI * 2);
              ctx.strokeStyle = `rgba(167,139,250,${(1 - rp) * 0.5})`;
              ctx.lineWidth = 1.5; ctx.stroke();
              // Click dot
              if (rp < 0.3) {
                ctx.beginPath();
                ctx.arc(ckx, cky, 4 * (1 - rp / 0.3) * S.cursorSize, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(124,111,245,${(1 - rp / 0.3) * 0.8})`;
                ctx.fill();
              }
            }
          }
        }
      }
    }
  }

  ctx.restore(); // clip

  // ── Film Grain ──
  if (FX.grain > 0) {
    if (!grainCanvas) { grainCanvas = document.createElement('canvas'); grainCtx = grainCanvas.getContext('2d'); }
    if (Date.now() - lastGrainUpdate > 50) {
      grainCanvas.width = Math.round(W / 2); grainCanvas.height = Math.round(H / 2);
      const gid = grainCtx.createImageData(grainCanvas.width, grainCanvas.height);
      const gd = gid.data;
      for (let gi = 0; gi < gd.length; gi += 4) {
        const gv = Math.random() * 255;
        gd[gi] = gd[gi+1] = gd[gi+2] = gv; gd[gi+3] = 255;
      }
      grainCtx.putImageData(gid, 0, 0);
      lastGrainUpdate = Date.now();
    }
    ctx.save();
    ctx.globalAlpha = FX.grain / 300;
    ctx.globalCompositeOperation = 'overlay';
    ctx.drawImage(grainCanvas, oX, oY, rW, rH);
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();
  }

  // ── Webcam overlay ──
  if (hasWebcam && S.webcamVisible && webcamVideo.videoWidth > 0) {
    const wcAspect = webcamVideo.videoWidth / webcamVideo.videoHeight;
    const wcDiam = Math.min(rW, rH) * S.webcamSize;
    const wcW = wcAspect >= 1 ? wcDiam : wcDiam * wcAspect;
    const wcH = wcAspect >= 1 ? wcDiam / wcAspect : wcDiam;
    const margin = 12;
    const wcCX = oX + margin + (rW - margin * 2) * S.webcamPosX;
    const wcCY = oY + margin + (rH - margin * 2) * S.webcamPosY;
    const wcX = wcCX - wcW / 2, wcY = wcCY - wcH / 2;
    ctx.save(); ctx.globalAlpha = S.webcamOpacity;
    if (S.webcamShadow) { ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 16; ctx.shadowOffsetY = 4; }
    ctx.beginPath();
    if (S.webcamShape === 'circle') { ctx.arc(wcCX, wcCY, Math.min(wcW, wcH) / 2, 0, Math.PI * 2); }
    else if (S.webcamShape === 'rounded') { rrect(ctx, wcX, wcY, wcW, wcH, Math.min(wcW, wcH) * 0.15); }
    else { ctx.rect(wcX, wcY, wcW, wcH); }
    if (S.webcamBorder) {
      ctx.fillStyle = S.webcamBorderColor; ctx.fill();
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
      const bw = S.webcamBorderWidth;
      ctx.beginPath();
      if (S.webcamShape === 'circle') { ctx.arc(wcCX, wcCY, Math.min(wcW, wcH) / 2 - bw, 0, Math.PI * 2); }
      else if (S.webcamShape === 'rounded') { rrect(ctx, wcX + bw, wcY + bw, wcW - bw * 2, wcH - bw * 2, Math.max(0, Math.min(wcW, wcH) * 0.15 - bw)); }
      else { ctx.rect(wcX + bw, wcY + bw, wcW - bw * 2, wcH - bw * 2); }
    }
    ctx.save(); ctx.clip();
    if (S.webcamFlip) { ctx.translate(wcCX, wcCY); ctx.scale(-1, 1); ctx.translate(-wcCX, -wcCY); }
    const da = S.webcamBorder ? { x: wcX + S.webcamBorderWidth, y: wcY + S.webcamBorderWidth, w: wcW - S.webcamBorderWidth * 2, h: wcH - S.webcamBorderWidth * 2 } : { x: wcX, y: wcY, w: wcW, h: wcH };
    const srcA = webcamVideo.videoWidth / webcamVideo.videoHeight, dstA = da.w / da.h;
    let sx, sy, sw, sh;
    if (srcA > dstA) { sh = webcamVideo.videoHeight; sw = sh * dstA; sx = (webcamVideo.videoWidth - sw) / 2; sy = 0; }
    else { sw = webcamVideo.videoWidth; sh = sw / dstA; sx = 0; sy = (webcamVideo.videoHeight - sh) / 2; }
    ctx.drawImage(webcamVideo, sx, sy, sw, sh, da.x, da.y, da.w, da.h);
    ctx.restore(); ctx.restore();
  }

  // Subtitles
  subtitles.filter(s=>video.currentTime>=s.start&&video.currentTime<=s.end).forEach(sub=>{
    const fs=S.subFontSize,py=oY+rH*(S.subPosY/100),cx2=oX+rW/2;
    const a=getSubAnim(sub,video.currentTime);
    ctx.save();ctx.font=`${S.subWeight} ${fs}px -apple-system,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    let alpha=1;if(['fadeIn','slideUp','popIn','bounce','glow','shake','scaleUp','colorWave'].includes(sub.anim))alpha=a.fi*a.fo;
    ctx.globalAlpha=Math.max(0,alpha);
    let offY=sub.anim==='slideUp'?(1-a.fi)*20:0;
    if(sub.anim==='shake'&&a.fi>0.5){offY+=Math.sin(a.e*30)*3*(1-a.e/((sub.end-sub.start)*0.5));}
    if(sub.anim==='bounce'){const bp=Math.min(1,a.fi*2);offY=-(1-bp)*(1-bp)*30+Math.abs(Math.sin(bp*Math.PI*3))*15*(1-bp);}
    ctx.translate(cx2,py+offY);
    if(sub.anim==='popIn'&&a.fi<1){const es=0.5+a.fi*0.5;ctx.scale(es,es);}
    if(sub.anim==='scaleUp'){const es=Math.min(1,a.fi*1.2);ctx.scale(es,es);}
    if(sub.anim==='bounce'&&a.fi<1){const bs=0.5+a.fi*0.6;ctx.scale(bs,bs);}
    const lines=sub.text.split('\n'),lh=fs*1.4;
    lines.forEach((line,i)=>{
      let dl=line;if(sub.anim==='typewriter')dl=line.substring(0,Math.floor(a.p*line.length*1.5));
      const ly=-lines.length*lh/2+i*lh+lh/2;
      if(S.subBg){const tw=ctx.measureText(dl).width;rrect(ctx,-tw/2-14,ly-lh/2-4,tw+28,lh+8,(lh+8)/2);ctx.fillStyle=S.subBgColor+Math.round(S.subBgAlpha*255).toString(16).padStart(2,'0');ctx.fill();}
      if(sub.anim==='glow'){ctx.shadowColor=S.subColor;ctx.shadowBlur=12+Math.sin(a.e*8)*6;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;}
      if(S.subOutline){ctx.strokeStyle=S.subOutlineColor;ctx.lineWidth=S.subOutlineWidth;ctx.lineJoin='round';ctx.strokeText(dl,0,ly);}
      if(sub.anim==='colorWave'){
        const grad=ctx.createLinearGradient(-100,ly,100,ly);
        const hue=(a.e*360)%360;
        grad.addColorStop(0,`hsl(${hue},90%,70%)`);grad.addColorStop(0.5,`hsl(${(hue+60)%360},90%,70%)`);grad.addColorStop(1,`hsl(${(hue+120)%360},90%,70%)`);
        ctx.fillStyle=grad;
      } else { ctx.fillStyle=S.subColor; }
      ctx.fillText(dl,0,ly);
      if(sub.anim==='glow'){ctx.shadowBlur=0;}
    });
    ctx.restore();
  });

  // ── Transition effects (6 types) ──
  splitPoints.forEach(sp => {
    const tr = transitions[sp.toFixed(3)];
    if (!tr) return;
    const halfDur = (tr.duration || 0.5) / 2;
    const t = video.currentTime;
    if (t < sp - halfDur || t > sp + halfDur) return;
    const progress = (t - (sp - halfDur)) / (halfDur * 2);
    const p2 = progress < 0.5 ? progress * 2 : (1 - progress) * 2; // triangle 0→1→0

    if (tr.type === 'fade') {
      ctx.fillStyle = `rgba(0,0,0,${p2 * 0.5})`;
      ctx.fillRect(oX, oY, rW, rH);
    } else if (tr.type === 'wipe') {
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      const wipeX = progress < 0.5 ? oX : oX + rW * (1 - (progress - 0.5) * 2);
      const wipeW = progress < 0.5 ? rW * progress * 2 : rW * (progress - 0.5) * 2;
      ctx.fillRect(wipeX, oY, wipeW, rH);
    } else if (tr.type === 'dissolve') {
      ctx.fillStyle = `rgba(255,255,255,${p2 * 0.6})`;
      ctx.fillRect(oX, oY, rW, rH);
    } else if (tr.type === 'zoom') {
      ctx.save();
      const zs = 1 + p2 * 0.3;
      ctx.translate(oX + rW/2, oY + rH/2);
      ctx.scale(zs, zs);
      ctx.translate(-(oX + rW/2), -(oY + rH/2));
      ctx.fillStyle = `rgba(0,0,0,${p2 * 0.4})`;
      ctx.fillRect(oX - rW, oY - rH, rW * 3, rH * 3);
      ctx.restore();
    } else if (tr.type === 'slide') {
      ctx.save();
      const slideOff = rW * (progress < 0.5 ? -progress * 2 : -(1 - progress) * 2) * 0.3;
      ctx.fillStyle = `rgba(0,0,0,${p2 * 0.3})`;
      ctx.fillRect(oX, oY, rW, rH);
      ctx.restore();
    } else if (tr.type === 'blur') {
      // Simulate blur transition with semi-transparent overlay
      ctx.fillStyle = `rgba(200,200,200,${p2 * 0.4})`;
      ctx.fillRect(oX, oY, rW, rH);
    }
  });

  // ── Annotations rendering ──
  renderAnnotations(ctx, video.currentTime, oX, oY, rW, rH, sX, sY, sW, sH, vw, vh);

  // ─��� Crop overlay (dim outside crop area) ──
  // ── Script path visualization (editor only) ──
  if ((currentTool === 'script' || currentTool === 'script-edit') && scriptWaypoints.length > 0) {
    ctx.save();
    ctx.strokeStyle = 'rgba(80,208,160,0.5)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    scriptWaypoints.forEach((wp, i) => {
      const sx = oX + wp.x * rW, sy = oY + wp.y * rH;
      if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
    });
    ctx.stroke();
    ctx.setLineDash([]);
    const wIcons = { move:'\u2192', click:'\u25CF', dblclick:'\u25C9', scroll:'\u2195', wait:'\u23F8' };
    scriptWaypoints.forEach((wp, idx) => {
      const sx = oX + wp.x * rW, sy = oY + wp.y * rH;
      const isSel = wp === selectedWaypoint;
      const isCur = Math.abs(video.currentTime - wp.t) < 0.2;
      ctx.beginPath(); ctx.arc(sx, sy, isSel ? 10 : 7, 0, Math.PI * 2);
      ctx.fillStyle = isSel ? '#50d0a0' : isCur ? '#7c6ff5' : 'rgba(80,208,160,0.7)';
      ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 9px -apple-system,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(String(idx + 1), sx, sy);
      ctx.font = '10px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.fillText(wIcons[wp.action] || '\u2192', sx, sy + 16);
      if (wp.text) { ctx.fillStyle = '#ffd54f'; ctx.beginPath(); ctx.arc(sx + 10, sy - 10, 3, 0, Math.PI * 2); ctx.fill(); }
    });
    ctx.restore();
  }

  if (cropEnabled && (cropRect.top > 0 || cropRect.bottom > 0 || cropRect.left > 0 || cropRect.right > 0)) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    const cT = oY + rH * (cropRect.top / 100);
    const cB = oY + rH * (1 - cropRect.bottom / 100);
    const cL = oX + rW * (cropRect.left / 100);
    const cR = oX + rW * (1 - cropRect.right / 100);
    // Top strip
    if (cropRect.top > 0) ctx.fillRect(oX, oY, rW, cT - oY);
    // Bottom strip
    if (cropRect.bottom > 0) ctx.fillRect(oX, cB, rW, oY + rH - cB);
    // Left strip
    if (cropRect.left > 0) ctx.fillRect(oX, cT, cL - oX, cB - cT);
    // Right strip
    if (cropRect.right > 0) ctx.fillRect(cR, cT, oX + rW - cR, cB - cT);
    // Crop border
    ctx.strokeStyle = 'rgba(124,111,245,0.8)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(cL, cT, cR - cL, cB - cT);
    // Rule of thirds guides
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 0.5;
    const cW = cR - cL, cH = cB - cT;
    for (let i = 1; i <= 2; i++) {
      ctx.beginPath(); ctx.moveTo(cL + cW * i / 3, cT); ctx.lineTo(cL + cW * i / 3, cB); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cL, cT + cH * i / 3); ctx.lineTo(cR, cT + cH * i / 3); ctx.stroke();
    }
    // Corner handles
    const hs = 8; // handle size
    ctx.fillStyle = 'rgba(124,111,245,1)';
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
    const corners = [[cL, cT], [cR, cT], [cL, cB], [cR, cB]];
    corners.forEach(([hx, hy]) => {
      ctx.fillRect(hx - hs/2, hy - hs/2, hs, hs);
      ctx.strokeRect(hx - hs/2, hy - hs/2, hs, hs);
    });
    // Edge handles (midpoints)
    const midX = (cL + cR) / 2, midY = (cT + cB) / 2;
    const edges = [[midX, cT], [midX, cB], [cL, midY], [cR, midY]];
    edges.forEach(([hx, hy]) => {
      ctx.fillRect(hx - hs/2, hy - hs/2, hs, hs);
      ctx.strokeRect(hx - hs/2, hy - hs/2, hs, hs);
    });
    // Size label
    const cropW = 100 - cropRect.left - cropRect.right;
    const cropH = 100 - cropRect.top - cropRect.bottom;
    ctx.font = '11px -apple-system,sans-serif';
    ctx.fillStyle = 'rgba(124,111,245,0.9)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(`${cropW}% × ${cropH}%`, midX, cT - 4);
  }

  // ── Motion Blur ──
  if (S.motionBlur && (Math.abs(curScale - 1) > 0.05 || !video.paused)) {
    if (!prevFrameCanvas) {
      prevFrameCanvas = document.createElement('canvas');
      prevFrameCtx = prevFrameCanvas.getContext('2d');
    }
    if (prevFrameCanvas.width !== canvas.width || prevFrameCanvas.height !== canvas.height) {
      prevFrameCanvas.width = canvas.width;
      prevFrameCanvas.height = canvas.height;
      prevFrameCtx.drawImage(canvas, 0, 0);
    } else {
      // Blend previous frame on top with alpha for motion blur
      ctx.save();
      ctx.globalAlpha = S.motionBlurStrength;
      ctx.drawImage(prevFrameCanvas, 0, 0);
      ctx.restore();
    }
    prevFrameCtx.clearRect(0, 0, prevFrameCanvas.width, prevFrameCanvas.height);
    prevFrameCtx.drawImage(canvas, 0, 0);
  }

  ctx.restore();
}
render();

// ═══════ Annotation Rendering ═══════
function renderAnnotations(c, time, oX, oY, rW, rH, sX, sY, sW, sH, vw, vh) {
  annotations.filter(a => time >= a.start && time <= a.end).forEach(ann => {
    // Convert normalized coords to canvas coords
    const ax1 = oX + ann.x1 * rW, ay1 = oY + ann.y1 * rH;
    const ax2 = oX + ann.x2 * rW, ay2 = oY + ann.y2 * rH;
    // Fade in/out
    const fadeIn = Math.min(1, (time - ann.start) / 0.2);
    const fadeOut = Math.min(1, (ann.end - time) / 0.2);
    c.save();
    c.globalAlpha = fadeIn * fadeOut;
    c.strokeStyle = ann.color;
    c.fillStyle = ann.color;
    c.lineWidth = ann.lineWidth;
    c.lineCap = 'round';
    c.lineJoin = 'round';

    if (ann.type === 'arrow') {
      const dx = ax2 - ax1, dy = ay2 - ay1;
      const angle = Math.atan2(dy, dx);
      const len = Math.hypot(dx, dy);
      const headLen = Math.min(20, len * 0.3);
      // Line
      c.beginPath();
      c.moveTo(ax1, ay1);
      c.lineTo(ax2, ay2);
      c.stroke();
      // Arrowhead
      c.beginPath();
      c.moveTo(ax2, ay2);
      c.lineTo(ax2 - headLen * Math.cos(angle - Math.PI / 6), ay2 - headLen * Math.sin(angle - Math.PI / 6));
      c.lineTo(ax2 - headLen * Math.cos(angle + Math.PI / 6), ay2 - headLen * Math.sin(angle + Math.PI / 6));
      c.closePath();
      c.fill();
    } else if (ann.type === 'rect') {
      c.strokeRect(ax1, ay1, ax2 - ax1, ay2 - ay1);
    } else if (ann.type === 'circle') {
      const cx2 = (ax1 + ax2) / 2, cy2 = (ay1 + ay2) / 2;
      const rx = Math.abs(ax2 - ax1) / 2, ry = Math.abs(ay2 - ay1) / 2;
      c.beginPath();
      c.ellipse(cx2, cy2, rx, ry, 0, 0, Math.PI * 2);
      c.stroke();
    } else if (ann.type === 'freehand' && ann.points && ann.points.length > 1) {
      c.beginPath();
      c.moveTo(oX + ann.points[0].x * rW, oY + ann.points[0].y * rH);
      for (let i = 1; i < ann.points.length; i++) {
        c.lineTo(oX + ann.points[i].x * rW, oY + ann.points[i].y * rH);
      }
      c.stroke();
    } else if (ann.type === 'anntext' && ann.text) {
      const fs = ann.fontSize || 32;
      c.font = `700 ${fs * (rW / 800)}px -apple-system,sans-serif`;
      c.textBaseline = 'top';
      // Background
      const tw = c.measureText(ann.text).width;
      c.fillStyle = 'rgba(0,0,0,0.5)';
      const fsPx = fs * (rW / 800);
      rrect(c, ax1 - 4, ay1 - 2, tw + 8, fsPx + 4, 4);
      c.fill();
      c.fillStyle = ann.color;
      c.fillText(ann.text, ax1, ay1);
    }

    // Selection highlight
    if (ann === selectedAnnotation) {
      c.strokeStyle = 'rgba(124,111,245,0.8)';
      c.lineWidth = 1;
      c.setLineDash([3, 3]);
      const margin = 4;
      c.strokeRect(
        Math.min(ax1, ax2) - margin, Math.min(ay1, ay2) - margin,
        Math.abs(ax2 - ax1) + margin * 2, Math.abs(ay2 - ay1) + margin * 2
      );
      c.setLineDash([]);
    }
    c.restore();
  });
}

function selectAnnotation(idx) {
  selectedAnnotation = annotations[idx];
  video.currentTime = annotations[idx].start;
  showToolProps('annotate');
}

// ═══════ Annotation Drawing on Canvas ═══════
let annDrawStart = null;
let annFreehandPoints = [];

canvas.addEventListener('mousedown', (e) => {
  if (currentTool !== 'annotate' || webcamDragging || cropDragging) return;
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio;
  const W = canvas.width / dpr, H = canvas.height / dpr;
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);
  const vw2 = video.videoWidth, vh2 = video.videoHeight;
  if (!vw2 || !vh2) return;
  const pad = S.padding, va = vw2 / vh2;
  const iW = W - pad * 2, iH = H - pad * 2;
  let rW, rH, oX, oY;
  if (va > iW / iH) { rW = iW; rH = rW / va; } else { rH = iH; rW = rH * va; }
  oX = pad + (iW - rW) / 2; oY = pad + (iH - rH) / 2;
  // Normalize to 0-1 within video area
  const nx = (mx - oX) / rW, ny = (my - oY) / rH;
  if (nx < 0 || nx > 1 || ny < 0 || ny > 1) return;

  annotationDrawing = true;
  annDrawStart = { nx, ny, oX, oY, rW, rH };
  annFreehandPoints = [{ x: nx, y: ny }];
  e.preventDefault();
  e.stopPropagation();
});

// ═══════ Script Canvas Interaction ═══════
canvas.addEventListener('mousedown', (e) => {
  if (currentTool !== 'script' && currentTool !== 'script-edit') return;
  if (webcamDragging || cropDragging) return;
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio;
  const W = canvas.width / dpr, H = canvas.height / dpr;
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);
  const vw2 = video.videoWidth, vh2 = video.videoHeight;
  if (!vw2 || !vh2) return;
  const pad = S.padding, va = vw2 / vh2;
  const iW = W - pad * 2, iH = H - pad * 2;
  let rW, rH, oX, oY;
  if (va > iW / iH) { rW = iW; rH = rW / va; } else { rH = iH; rW = rH * va; }
  oX = pad + (iW - rW) / 2; oY = pad + (iH - rH) / 2;
  const nx = (mx - oX) / rW, ny = (my - oY) / rH;
  if (nx < 0 || nx > 1 || ny < 0 || ny > 1) return;
  e.preventDefault(); e.stopPropagation();

  // Hit test existing waypoints
  const hitWp = scriptWaypoints.find(wp => {
    const sx = oX + wp.x * rW, sy = oY + wp.y * rH;
    return Math.hypot(mx - sx, my - sy) < 15;
  });

  if (hitWp) {
    scriptDraggingWp = hitWp;
    selectedWaypoint = hitWp;
    showToolProps('script-edit');
    const startX = e.clientX, startY = e.clientY;
    const origX = hitWp.x, origY = hitWp.y;
    const onMove = (ev) => {
      const mx2 = (ev.clientX - rect.left) * (W / rect.width);
      const my2 = (ev.clientY - rect.top) * (H / rect.height);
      hitWp.x = Math.max(0, Math.min(1, (mx2 - oX) / rW));
      hitWp.y = Math.max(0, Math.min(1, (my2 - oY) / rH));
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      scriptDraggingWp = null;
      showToolProps('script-edit');
      saveState();
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  } else {
    // Add new waypoint
    const wp = { id: Date.now(), t: video.currentTime, x: nx, y: ny, action: 'click', duration: 0, text: '' };
    scriptWaypoints.push(wp);
    scriptWaypoints.sort((a, b) => a.t - b.t);
    selectedWaypoint = wp;
    updateScriptTrackVisibility();
    renderScriptTrack();
    showToolProps('script-edit');
    saveState();
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (!annotationDrawing || !annDrawStart) return;
  if (annotationTool === 'freehand') {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio;
    const W = canvas.width / dpr, H = canvas.height / dpr;
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const my = (e.clientY - rect.top) * (H / rect.height);
    const nx = (mx - annDrawStart.oX) / annDrawStart.rW;
    const ny = (my - annDrawStart.oY) / annDrawStart.rH;
    annFreehandPoints.push({ x: Math.max(0, Math.min(1, nx)), y: Math.max(0, Math.min(1, ny)) });
  }
});

canvas.addEventListener('mouseup', (e) => {
  if (!annotationDrawing || !annDrawStart) return;
  annotationDrawing = false;
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio;
  const W = canvas.width / dpr, H = canvas.height / dpr;
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);
  const nx2 = Math.max(0, Math.min(1, (mx - annDrawStart.oX) / annDrawStart.rW));
  const ny2 = Math.max(0, Math.min(1, (my - annDrawStart.oY) / annDrawStart.rH));

  const color = document.getElementById('annColor')?.value || '#ff4444';
  const lineWidth = parseInt(document.getElementById('annLineWidth')?.value || 4);
  const fontSize = parseInt(document.getElementById('annFontSize')?.value || 32);
  const t = video.currentTime;

  const ann = {
    id: Date.now(),
    type: annotationTool,
    start: t,
    end: Math.min(getDur(), t + 3),
    x1: annDrawStart.nx, y1: annDrawStart.ny,
    x2: nx2, y2: ny2,
    color, lineWidth, fontSize,
    points: annotationTool === 'freehand' ? [...annFreehandPoints] : null,
    text: annotationTool === 'anntext' ? prompt('주석 텍스트:') || '' : null,
  };
  if (annotationTool === 'anntext' && !ann.text) return;
  // Skip tiny accidental drags (except freehand)
  if (annotationTool !== 'freehand' && annotationTool !== 'anntext' && Math.hypot(nx2 - annDrawStart.nx, ny2 - annDrawStart.ny) < 0.01) return;

  annotations.push(ann);
  selectedAnnotation = ann;
  showToolProps('annotate');
  saveState();
  annDrawStart = null;
});

// ═══════ Zoom Keyframes ═══════
function getKfAt(t){if(!zoomKeyframes.length)return null;const s=[...zoomKeyframes].sort((a,b)=>a.t-b.t);if(t<=s[0].t)return s[0];if(t>=s[s.length-1].t)return s[s.length-1];for(let i=0;i<s.length-1;i++){if(t>=s[i].t&&t<=s[i+1].t){const a2=s[i],b2=s[i+1],p=(t-a2.t)/(b2.t-a2.t),ep=p<0.5?2*p*p:1-Math.pow(-2*p+2,2)/2;return{zoom:a2.zoom+(b2.zoom-a2.zoom)*ep,x:a2.x+(b2.x-a2.x)*ep,y:a2.y+(b2.y-a2.y)*ep};}}return s[s.length-1];}

// ═══════ Playback ═══════
function syncWebcam(){if(hasWebcam)webcamVideo.currentTime=video.currentTime;}
function togglePlay(){if(video.paused){if(video.currentTime<trimStart||video.currentTime>=trimEnd){video.currentTime=trimStart;ttsPlayedWaypoints.clear();}video.play();if(hasWebcam){webcamVideo.currentTime=video.currentTime;webcamVideo.play();}$('playBtn').textContent='⏸';}else{video.pause();if(hasWebcam)webcamVideo.pause();stopAllTTS();$('playBtn').textContent='▶';}}
$('playBtn').addEventListener('click',togglePlay);
$('speedBtn').addEventListener('click',()=>{speedIdx=(speedIdx+1)%speeds.length;playbackSpeed=speeds[speedIdx];video.playbackRate=playbackSpeed;$('speedBtn').textContent=playbackSpeed+'x';});

video.addEventListener('timeupdate',()=>{
  const dur=getDur();if(!dur)return;
  if(video.currentTime>=trimEnd){video.pause();if(hasWebcam)webcamVideo.pause();video.currentTime=trimStart;$('playBtn').textContent='▶';}
  if(hasWebcam&&video.paused&&Math.abs(webcamVideo.currentTime-video.currentTime)>0.2)syncWebcam();
  // Apply segment speed
  if(!video.paused){const segSpd=getSegmentSpeedAt(video.currentTime)*playbackSpeed;if(Math.abs(video.playbackRate-segSpd)>0.01)video.playbackRate=segSpd;}
  const pct=video.currentTime/dur;
  $('playhead').style.left=`calc(56px + (100% - 56px) * ${pct})`;
  $('tc').textContent=`${fmtT(video.currentTime)} / ${fmtT(dur)}`;
  // Highlight selected sub
  document.querySelectorAll('.tl-sub').forEach(el=>{
    const idx=parseInt(el.dataset.idx);
    if(subtitles[idx])el.classList.toggle('selected',selectedSub===subtitles[idx]);
  });
  // TTS auto-play during preview
  if (!video.paused && scriptMode && ttsAutoPlay) {
    triggerTTSAtTime(video.currentTime);
  }
});
video.addEventListener('ended',()=>{$('playBtn').textContent='▶';});

// Click on tracks to seek
$('tracks').addEventListener('click',(e)=>{
  if(e.target.closest('.tl-sub')||e.target.closest('.tl-trim-h')||e.target.closest('.tl-add-btn')||e.target.closest('.tl-kf')||e.target.closest('.tl-segment'))return;
  const content=e.target.closest('.tl-track-content');
  if(!content)return;
  const rect=content.getBoundingClientRect();
  video.currentTime=Math.max(0,(e.clientX-rect.left)/rect.width)*getDur();
});

// ═══════ Keyboard ═══════
document.addEventListener('keydown',(e)=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.code==='Escape'){hideRulerPopup();}
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowLeft')video.currentTime=Math.max(trimStart,video.currentTime-(e.shiftKey?0.1:e.altKey?5:1));
  if(e.code==='ArrowRight')video.currentTime=Math.min(trimEnd,video.currentTime+(e.shiftKey?0.1:e.altKey?5:1));
  if(e.code==='Comma'){e.preventDefault();video.currentTime=Math.max(0,video.currentTime-1/30);}  // , = 1프레임 뒤로
  if(e.code==='Period'){e.preventDefault();video.currentTime=Math.min(getDur(),video.currentTime+1/30);}  // . = 1프레임 앞으로
  if(e.code==='KeyI'){trimStart=video.currentTime;updateTrimUI();if(currentTool==='export')showToolProps('export');}
  if(e.code==='KeyO'){trimEnd=video.currentTime;updateTrimUI();if(currentTool==='export')showToolProps('export');}
  if(e.code==='KeyT'){e.preventDefault();addSubAtPlayhead();}
  if(e.code==='KeyC'){e.preventDefault();
    // 현재 재생헤드 위치의 세그먼트를 자동 선택하고 삭제
    const segs=getSegments();const ct=video.currentTime;
    const si=segs.findIndex(s=>ct>=s.start&&ct<s.end);
    if(si>=0){selectedSegIdx=si;deleteSelectedSegment();}
  }
  if(e.code==='KeyS'){e.preventDefault();splitAtPlayhead();}
  if(e.code==='KeyP'){e.preventDefault();captureFrame();}
  if((e.metaKey||e.ctrlKey)&&e.code==='KeyZ'&&!e.shiftKey){e.preventDefault();undo();}
  if((e.metaKey||e.ctrlKey)&&e.code==='KeyZ'&&e.shiftKey){e.preventDefault();redo();}
  if(e.code==='Delete'||e.code==='Backspace'){
    if(selectedSegIdx>=0){e.preventDefault();deleteSelectedSegment();}
    else if(selectedSub){deleteSelectedSub();}
  }
});

// ═══════ Trim ═══════
function updateTrimUI(){
  const d=getDur();if(!d)return;
  if(!isFinite(trimEnd)||trimEnd<=0)trimEnd=d;
  $('trimDimL').style.width=(trimStart/d*100)+'%';
  $('trimDimR').style.width=((d-trimEnd)/d*100)+'%';
  $('trimHL').style.left=(trimStart/d*100)+'%';
  $('trimHR').style.right=((d-trimEnd)/d*100)+'%';
}
function setupTrimDrag(h,type){
  h.addEventListener('mousedown',(e)=>{e.stopPropagation();
    const track=$('videoTrack');
    const onMove=(ev)=>{const rect=track.getBoundingClientRect();const pct=Math.max(0,Math.min(1,(ev.clientX-rect.left)/rect.width));const sec=pct*getDur();
      if(type==='start')trimStart=Math.min(sec,trimEnd-0.5);else trimEnd=Math.max(sec,trimStart+0.5);updateTrimUI();};
    const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  });
}
setupTrimDrag($('trimHL'),'start');
setupTrimDrag($('trimHR'),'end');

function addSubAtPlayhead(){

// ═══════ Segment Selection (CapCut-style) ═══════
let selectedSegIdx = -1; // index of the selected segment

function getSegments() {
  // Segments are defined by trimStart, splitPoints, trimEnd
  const boundaries = [trimStart, ...splitPoints.filter(s => s > trimStart && s < trimEnd), trimEnd];
  const segs = [];
  for (let i = 0; i < boundaries.length - 1; i++) {
    segs.push({ start: boundaries[i], end: boundaries[i+1], deleted: isSegmentDeleted(boundaries[i], boundaries[i+1]) });
  }
  return segs;
}

function isSegmentDeleted(start, end) {
  return cuts.some(c => c.start <= start + 0.05 && c.end >= end - 0.05);
}

function deleteSelectedSegment() {
  const segs = getSegments();
  if (selectedSegIdx < 0 || selectedSegIdx >= segs.length) return;
  const seg = segs[selectedSegIdx];
  if (seg.deleted) return; // already deleted
  cuts.push({ start: seg.start, end: seg.end });
  mergeCuts();
  renderCutTrack(); renderSegments(); saveState();
  if (currentTool === 'export') showToolProps('export');
}

function restoreSelectedSegment() {
  const segs = getSegments();
  if (selectedSegIdx < 0 || selectedSegIdx >= segs.length) return;
  const seg = segs[selectedSegIdx];
  if (!seg.deleted) return; // not deleted
  // Remove cuts that overlap this segment
  cuts = cuts.filter(c => !(c.start <= seg.start + 0.05 && c.end >= seg.end - 0.05));
  renderCutTrack(); renderSegments(); saveState();
  if (currentTool === 'export') showToolProps('export');
}

// ═══════ Snap System ═══════
function getSnapTargets(excludeTimes) {
  const dur = getDur();
  const targets = new Set();
  const segs = getSegments();
  segs.forEach(s => { targets.add(s.start); targets.add(s.end); });
  targets.add(video.currentTime); // playhead
  // Round time values
  const interval = dur <= 30 ? 1 : dur <= 120 ? 5 : 10;
  for (let t = 0; t <= dur; t += interval) targets.add(t);
  if (excludeTimes) excludeTimes.forEach(t => targets.delete(t));
  return [...targets].sort((a, b) => a - b);
}

function findSnap(time, excludeTimes, thresholdSec) {
  thresholdSec = thresholdSec || 0.15;
  const targets = getSnapTargets(excludeTimes);
  let best = null, bestDist = thresholdSec;
  for (const t of targets) {
    const d = Math.abs(time - t);
    if (d < bestDist) { bestDist = d; best = t; }
  }
  return best;
}

function showSnapLine(track, time) {
  removeSnapLine();
  const dur = getDur();
  const line = document.createElement('div');
  line.className = 'tl-snap-line';
  line.style.left = (time / dur * 100) + '%';
  line.id = '_snapLine';
  track.appendChild(line);
}

function removeSnapLine() {
  const el = document.getElementById('_snapLine');
  if (el) el.remove();
}

function renderSegments() {
  const track = $('videoTrack');
  track.querySelectorAll('.tl-segment').forEach(e => e.remove());
  removeSnapLine();
  const dur = getDur(); if (!dur) return;
  const segs = getSegments();
  segs.forEach((seg, idx) => {
    const el = document.createElement('div');
    const isSelected = (idx === selectedSegIdx);
    el.className = 'tl-segment' + (isSelected ? ' selected' : '') + (seg.deleted ? ' deleted' : '');
    el.style.left = (seg.start / dur * 100) + '%';
    el.style.width = ((seg.end - seg.start) / dur * 100) + '%';
    const spd = segmentSpeeds[idx] || 1;

    // Inner content: label + resize handles
    const label = document.createElement('span');
    label.textContent = (seg.end - seg.start).toFixed(1) + 's' + (spd !== 1 ? ` ${spd}x` : '');
    label.style.cssText = 'pointer-events:none;z-index:1;';
    el.appendChild(label);

    // Resize handles (left/right edges)
    if (!seg.deleted) {
      const lh = document.createElement('div');
      lh.className = 'tl-segment-resize left';
      el.appendChild(lh);
      const rh = document.createElement('div');
      rh.className = 'tl-segment-resize right';
      el.appendChild(rh);

      // Resize drag
      [lh, rh].forEach((handle, hi) => {
        const isLeft = hi === 0;
        handle.addEventListener('mousedown', (e) => {
          e.stopPropagation();
          e.preventDefault();
          const onMove = (ev) => {
            const rect = track.getBoundingClientRect();
            const pct = Math.max(0, Math.min(1, (ev.clientX - rect.left) / rect.width));
            let sec = pct * dur;
            // Snap
            const snap = findSnap(sec, new Set([isLeft ? seg.start : seg.end]));
            if (snap !== null) { sec = snap; showSnapLine(track, sec); } else { removeSnapLine(); }
            // Adjust the split point
            if (isLeft) {
              const minTime = idx > 0 ? segs[idx - 1].start + 0.1 : trimStart;
              sec = Math.max(minTime, Math.min(sec, seg.end - 0.1));
              // Find and move the split point at seg.start
              const spIdx = splitPoints.indexOf(seg.start);
              if (spIdx >= 0) { splitPoints[spIdx] = sec; splitPoints.sort((a, b) => a - b); }
              else if (Math.abs(seg.start - trimStart) > 0.05) { trimStart = sec; }
            } else {
              const maxTime = idx < segs.length - 1 ? segs[idx + 1].end - 0.1 : trimEnd;
              sec = Math.min(maxTime, Math.max(sec, seg.start + 0.1));
              const spIdx = splitPoints.indexOf(seg.end);
              if (spIdx >= 0) { splitPoints[spIdx] = sec; splitPoints.sort((a, b) => a - b); }
              else if (Math.abs(seg.end - trimEnd) > 0.05) { trimEnd = sec; }
            }
            renderSegments(); renderSplitMarkers(); updateTrimUI();
          };
          const onUp = () => {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            removeSnapLine();
            saveState();
          };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      });
    }

    // Speed visual
    if (spd < 1) {
      el.style.borderColor = 'rgba(100,181,246,0.6)';
      el.style.background = 'linear-gradient(180deg, rgba(100,181,246,0.2), rgba(100,181,246,0.08))';
    } else if (spd > 1) {
      el.style.borderColor = 'rgba(255,213,79,0.6)';
      el.style.background = 'linear-gradient(180deg, rgba(255,213,79,0.2), rgba(255,213,79,0.08))';
    }
    el.title = seg.deleted
      ? `[삭제됨] ${fmtT(seg.start)}→${fmtT(seg.end)} — 클릭 후 ♻복원`
      : `${fmtT(seg.start)}→${fmtT(seg.end)}${spd!==1?' 속도:'+spd+'x':''} — 드래그 이동 | 가장자리 드래그로 크기 조절`;

    // Click/drag handler
    el.addEventListener('mousedown', (e) => {
      if (e.target.classList.contains('tl-segment-resize')) return;
      e.stopPropagation();
      const startX = e.clientX;
      const origStart = seg.start, origEnd = seg.end, segDur = origEnd - origStart;
      let dragged = false;

      const onMove = (ev) => {
        const dx = Math.abs(ev.clientX - startX);
        if (dx < 5 && !dragged) return; // threshold
        dragged = true;
        el.classList.add('dragging');

        const rect = track.getBoundingClientRect();
        const dtSec = ((ev.clientX - startX) / rect.width) * dur;
        let newStart = origStart + dtSec;
        let newEnd = newStart + segDur;

        // Clamp to bounds
        if (newStart < trimStart) { newStart = trimStart; newEnd = newStart + segDur; }
        if (newEnd > trimEnd) { newEnd = trimEnd; newStart = newEnd - segDur; }

        // Snap start edge
        const snapS = findSnap(newStart, new Set([origStart, origEnd]));
        if (snapS !== null) {
          newStart = snapS; newEnd = newStart + segDur;
          showSnapLine(track, snapS);
        } else {
          // Snap end edge
          const snapE = findSnap(newEnd, new Set([origStart, origEnd]));
          if (snapE !== null) {
            newEnd = snapE; newStart = newEnd - segDur;
            showSnapLine(track, snapE);
          } else {
            removeSnapLine();
          }
        }

        // Move split points
        const leftSp = splitPoints.indexOf(origStart);
        const rightSp = splitPoints.indexOf(origEnd);
        if (leftSp >= 0) splitPoints[leftSp] = newStart;
        if (rightSp >= 0) splitPoints[rightSp] = newEnd;
        splitPoints.sort((a, b) => a - b);

        // Visual update only
        el.style.left = (newStart / dur * 100) + '%';
        el.style.width = (segDur / dur * 100) + '%';
      };

      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        el.classList.remove('dragging');
        removeSnapLine();

        if (!dragged) {
          // Click: select/deselect
          selectedSegIdx = (selectedSegIdx === idx) ? -1 : idx;
          renderSegments();
          updateSpeedButtons();
        } else {
          renderSegments(); renderSplitMarkers(); renderCutTrack();
          saveState();
        }
      };

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    track.appendChild(el);
  });
}

// ═══════ Timeline Ruler ═══════
function renderRuler() {
  const ruler = $('ruler');
  // Keep selection overlay
  const sel = $('rulerSel');
  ruler.querySelectorAll('.tl-ruler-tick,.tl-ruler-label').forEach(e => e.remove());
  const effDur = getDur();
  if (!effDur || effDur < 0.1) return;

  // Decide tick interval based on duration
  let interval;
  if (effDur <= 5) interval = 0.5;
  else if (effDur <= 15) interval = 1;
  else if (effDur <= 60) interval = 5;
  else if (effDur <= 300) interval = 10;
  else interval = 30;

  const majorEvery = effDur <= 15 ? 2 : 2; // every Nth tick is major

  for (let t = 0, i = 0; t <= effDur; t += interval, i++) {
    const pct = (t / effDur * 100);
    const isMajor = (i % majorEvery === 0);

    const tick = document.createElement('div');
    tick.className = 'tl-ruler-tick' + (isMajor ? ' major' : '');
    tick.style.left = pct + '%';
    ruler.appendChild(tick);

    if (isMajor) {
      const label = document.createElement('div');
      label.className = 'tl-ruler-label';
      label.style.left = pct + '%';
      const m = Math.floor(t / 60);
      const s = Math.floor(t % 60);
      label.textContent = m > 0 ? `${m}:${s.toString().padStart(2,'0')}` : `${s}s`;
      ruler.appendChild(label);
    }
  }
}

// ═══════ Ruler: click=seek, drag=range select ═══════
let rulerRange = null; // {startEff, endEff, startSrc, endSrc}

function rulerPctToTime(clientX) {
  const rect = $('ruler').getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  return pct * getDur();
}

$('ruler').addEventListener('mousedown', (e) => {
  if (e.target.closest('.tl-ruler-sel')) return;
  const startX = e.clientX;
  const startEff = rulerPctToTime(e.clientX);
  let dragged = false;
  hideRulerPopup();

  const sel = $('rulerSel');

  const onMove = (ev) => {
    const dx = Math.abs(ev.clientX - startX);
    if (dx > 5) dragged = true;

    if (dragged) {
      const curTime = rulerPctToTime(ev.clientX);
      const dur2 = getDur();
      const s = Math.min(startEff, curTime), en = Math.max(startEff, curTime);
      sel.style.display = 'block';
      sel.style.left = (s / dur2 * 100) + '%';
      sel.style.width = ((en - s) / dur2 * 100) + '%';
      // label
      sel.innerHTML = `<div class="tl-ruler-sel-label">${(en - s).toFixed(1)}s</div>`;
    }
  };

  const onUp = (ev) => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);

    if (!dragged) {
      // Short click = seek
      sel.style.display = 'none';
      rulerRange = null;
      video.currentTime = startEff;
    } else {
      // Drag = range selection
      const endEff = rulerPctToTime(ev.clientX);
      const s = Math.min(startEff, endEff), en = Math.max(startEff, endEff);
      if (en - s > 0.1) {
        rulerRange = { start: s, end: en };
        showRulerPopup(ev.clientX);
      } else {
        sel.style.display = 'none';
        rulerRange = null;
        video.currentTime = startEff;
      }
    }
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

function showRulerPopup(x) {
  const popup = $('rulerPopup');
  const rulerRect = $('ruler').getBoundingClientRect();
  popup.style.left = Math.min(x, window.innerWidth - 200) + 'px';
  popup.style.top = (rulerRect.bottom + 2) + 'px';
  popup.classList.add('show');
}

function hideRulerPopup() {
  $('rulerPopup').classList.remove('show');
  $('rulerSel').style.display = 'none';
  rulerRange = null;
}

function rulerDeleteRange() {
  if (!rulerRange) return;
  const startSrc = rulerRange.start, endSrc = rulerRange.end;
  // Add splits at boundaries if not already there
  if (startSrc > trimStart + 0.1 && !splitPoints.some(sp => Math.abs(sp - startSrc) < 0.05)) {
    splitPoints.push(startSrc);
  }
  if (endSrc < trimEnd - 0.1 && !splitPoints.some(sp => Math.abs(sp - endSrc) < 0.05)) {
    splitPoints.push(endSrc);
  }
  splitPoints.sort((a, b) => a - b);
  // Add cut for this range
  cuts.push({ start: startSrc, end: endSrc });
  mergeCuts();
  renderSplitMarkers(); renderCutTrack(); renderRuler(); saveState();
  hideRulerPopup();
}

function rulerTrimToRange() {
  if (!rulerRange) return;
  const startSrc = rulerRange.start, endSrc = rulerRange.end;
  // Trim to only keep this range - cut everything outside
  if (startSrc > trimStart + 0.05) {
    cuts.push({ start: trimStart, end: startSrc });
  }
  if (endSrc < trimEnd - 0.05) {
    cuts.push({ start: endSrc, end: trimEnd });
  }
  mergeCuts();
  renderSplitMarkers(); renderCutTrack(); renderRuler(); saveState();
  hideRulerPopup();
}

function rulerCancelRange() {
  hideRulerPopup();
}

// ═══════ Split & Transitions ═══════
// ═══════ Segment Speed Control ═══════
function setSegmentSpeed(speed) {
  // 세그먼트 미선택 시 현재 재생 위치의 세그먼트를 자동 선택
  if (selectedSegIdx < 0) {
    const segs = getSegments();
    const ct = video.currentTime;
    const si = segs.findIndex(s => ct >= s.start && ct < s.end);
    if (si >= 0) selectedSegIdx = si;
    else return;
  }
  segmentSpeeds[selectedSegIdx] = speed;
  renderSegments();
  updateSpeedButtons();
  saveState();
}

function updateSpeedButtons() {
  const spd = selectedSegIdx >= 0 ? (segmentSpeeds[selectedSegIdx] || 1) : -1;
  ['spd05','spd1','spd15','spd2'].forEach(id => {
    const el = $(id);
    if (el) el.classList.remove('active');
  });
  if (spd === 0.5 && $('spd05')) $('spd05').classList.add('active');
  else if (spd === 1 && $('spd1')) $('spd1').classList.add('active');
  else if (spd === 1.5 && $('spd15')) $('spd15').classList.add('active');
  else if (spd === 2 && $('spd2')) $('spd2').classList.add('active');
}

function getSegmentSpeedAt(t) {
  const segs = getSegments();
  for (let i = 0; i < segs.length; i++) {
    if (t >= segs[i].start && t < segs[i].end) {
      return segmentSpeeds[i] || 1;
    }
  }
  return 1;
}

function splitAtPlayhead() {
  const t = video.currentTime;
  if (t <= trimStart + 0.1 || t >= trimEnd - 0.1) return;
  // Avoid duplicate splits
  if (splitPoints.some(sp => Math.abs(sp - t) < 0.1)) return;
  splitPoints.push(t);
  splitPoints.sort((a,b) => a - b);
  selectedSegIdx = -1;
  renderSplitMarkers();
  renderSegments();
  renderRuler();
  saveState();
}

function addTransition(splitTime, type) {
  const key = splitTime.toFixed(3);
  if (transitions[key]) {
    // Cycle through all 6 types + remove
    const types = ['fade','wipe','dissolve','zoom','slide','blur','none'];
    const curIdx = types.indexOf(transitions[key].type);
    const nextType = types[(curIdx+1)%types.length];
    if (nextType === 'none') { delete transitions[key]; }
    else { transitions[key].type = nextType; }
  } else {
    transitions[key] = { type: type || 'fade', duration: 0.5 };
  }
  renderSplitMarkers();
  saveState();
}

function renderSplitMarkers() {
  const track = $('videoTrack');
  track.querySelectorAll('.tl-split,.tl-transition').forEach(e => e.remove());
  const dur = getDur(); if (!dur) return;
  splitPoints.forEach(sp => {
    // Split marker
    const el = document.createElement('div');
    el.className = 'tl-split';
    el.style.left = (sp / dur * 100) + '%';
    el.addEventListener('click', (e) => { e.stopPropagation(); addTransition(sp, 'fade'); });
    el.addEventListener('contextmenu', (e) => { e.preventDefault(); e.stopPropagation(); splitPoints = splitPoints.filter(s => s !== sp); delete transitions[sp.toFixed(3)]; renderSplitMarkers(); saveState(); });
    el.title = '클릭: 트랜지션 추가/변경 | 우클릭: 분할 삭제';
    track.appendChild(el);
    // Transition badge
    const tr = transitions[sp.toFixed(3)];
    if (tr) {
      const badge = document.createElement('div');
      badge.className = 'tl-transition';
      const tDur = tr.duration || 0.5;
      badge.style.left = ((sp - tDur/2) / dur * 100) + '%';
      badge.style.width = (tDur / dur * 100) + '%';
      const trIcons = {fade:'◐',wipe:'◧',dissolve:'◇',zoom:'⊕',slide:'◫',blur:'◉'};
      badge.textContent = trIcons[tr.type] || '◐';
      badge.title = `${tr.type} (${tDur}s) - 클릭하여 변경`;
      badge.addEventListener('click', (e) => { e.stopPropagation(); addTransition(sp); });
      track.appendChild(badge);
    }
  });
}

function saveState() {
  const state = {
    subtitles: JSON.parse(JSON.stringify(subtitles)),
    cuts: JSON.parse(JSON.stringify(cuts)),
    splitPoints: [...splitPoints],
    transitions: JSON.parse(JSON.stringify(transitions)),

    cropEnabled, cropRect: {...cropRect},
    trimStart, trimEnd, selectedBg,
    S: {...S}, FX: {...FX},
    activeFilter, audioSettings: {...audioSettings},
    scriptWaypoints: JSON.parse(JSON.stringify(scriptWaypoints)),
    scriptMode,
  };
  history = history.slice(0, historyIdx + 1);
  history.push(state);
  historyIdx++;
  if (history.length > MAX_HISTORY) { history.shift(); historyIdx--; }
  updateHistoryBtns();
}
function undo() {
  if (historyIdx <= 0) return;
  historyIdx--;
  restoreState(history[historyIdx]);
}
function redo() {
  if (historyIdx >= history.length - 1) return;
  historyIdx++;
  restoreState(history[historyIdx]);
}
function restoreState(state) {

  trimStart = state.trimStart; trimEnd = state.trimEnd;
  selectedBg = state.selectedBg;
  Object.assign(S, state.S);
  if (state.FX) Object.assign(FX, state.FX);
  if (state.activeFilter) activeFilter = state.activeFilter;
  if (state.audioSettings) Object.assign(audioSettings, state.audioSettings);
  if (state.scriptWaypoints) scriptWaypoints = JSON.parse(JSON.stringify(state.scriptWaypoints));
  if (state.scriptMode !== undefined) scriptMode = state.scriptMode;
  selectedSub = null; selectedSegIdx = -1; selectedWaypoint = null;
  renderSubTrack(); renderCutTrack(); renderSplitMarkers(); renderSegments(); renderScriptTrack();
  updateTrimUI(); showToolProps(currentTool);
  updateHistoryBtns();
}

// ═══════ Cuts (구간 삭제) ═══════
function isInCutRegion(t) {
  return cuts.some(c => t >= c.start && t < c.end);
}

function getNextNonCutTime(t) {
  for (const c of cuts) {
    if (t >= c.start && t < c.end) return c.end;
  }
  return t;
}

function getEffectiveDuration() {
  let total = trimEnd - trimStart;
  for (const c of cuts) {
    const cs = Math.max(c.start, trimStart);
    const ce = Math.min(c.end, trimEnd);
    if (ce > cs) total -= (ce - cs);
  }
  return Math.max(0.01, total);
}

// ═══════ Effective Time Mapping ═══════
// Source time → effective time (cuts removed)
function sourceToEffective(t) {
  let eff = t - trimStart;
  for (const c of cuts) {
    const cs = Math.max(c.start, trimStart);
    const ce = Math.min(c.end, trimEnd);
    if (ce <= cs) continue;
    if (t > ce) eff -= (ce - cs);
    else if (t > cs) eff -= (t - cs);
  }
  return Math.max(0, eff);
}
// Effective time → source time
function effectiveToSource(eff) {
  let src = trimStart + eff;
  for (const c of cuts) {
    const cs = Math.max(c.start, trimStart);
    const ce = Math.min(c.end, trimEnd);
    if (ce <= cs) continue;
    if (src >= cs) src += (ce - cs);
  }
  return Math.min(src, trimEnd);
}

function renderCutTrack() {
  $('videoTrack').querySelectorAll('.tl-cut,.tl-cut-recording').forEach(e => e.remove());
  renderSegments();
  renderRuler();
  updateTrimUI();
  renderTimelineWaveform();
}

function mergeCuts() {
  cuts.sort((a, b) => a.start - b.start);
  for (let i = cuts.length - 1; i > 0; i--) {
    if (cuts[i].start <= cuts[i-1].end) {
      cuts[i-1].end = Math.max(cuts[i-1].end, cuts[i].end);
      cuts.splice(i, 1);
    }
  }
}

// Skip over cut regions during playback
video.addEventListener('timeupdate', () => {
  if (!video.paused && cuts.length > 0) {
    const t = video.currentTime;
    const next = getNextNonCutTime(t);
    if (next !== t) video.currentTime = next;
  }
});

// ═══════ Frame Capture (이미지 캡처) ═══════

  }

// ═══════ Auto Capture (자동 캡처) ═══════
let autoCaptureRunning = false;

async function startAutoCapture(){
  if(autoCaptureRunning) return;
  const intervalSec = parseFloat($('autoCaptureInterval')?.value || 1);
  if(isNaN(intervalSec) || intervalSec <= 0) return;

  const folder = await window.electronAPI.selectFolderDialog();
  if(!folder) return;

  autoCaptureRunning = true;
  const btn = $('autoCaptureBtn');
  const st = $('autoCaptureStatus');
  if(btn){btn.textContent='중지';btn.onclick=stopAutoCapture;}

  video.pause();
  let t = trimStart;
  let count = 0;
  const total = Math.floor((trimEnd - trimStart) / intervalSec) + 1;
  if(st) st.textContent = `캡처 준비 중...`;

  for(let i = 0; i < total && autoCaptureRunning; i++){
    t = trimStart + i * intervalSec;
    if(t > trimEnd) break;
    // 삭제 구간 건너뛰기
    if(isInCutRegion(t)){continue;}

    video.currentTime = t;
    await new Promise(r => { video.onseeked = r; });
    // 렌더링 안정화를 위해 한 프레임 대기
    await new Promise(r => requestAnimationFrame(r));

    const off = renderFrameToCanvas(t);
    if(!off) continue;
    const blob = await new Promise(r => off.toBlob(r, 'image/png'));
    const buf = await blob.arrayBuffer();
    count++;
    const fileName = `octo-capture-${String(count).padStart(4,'0')}.png`;
    await window.electronAPI.writeFile({filePath: folder + '/' + fileName, buffer: buf});
    if(st) st.textContent = `캡처 중... ${count}/${total}`;
  }

  autoCaptureRunning = false;
  if(btn){btn.textContent='자동 캡처 시작';btn.onclick=startAutoCapture;}
  if(st) st.textContent = count > 0 ? `완료! ${count}장 저장됨` : '캡처된 이미지 없음';
}

function stopAutoCapture(){
  autoCaptureRunning = false;
}
