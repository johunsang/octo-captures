    if(FX.scanlines){oc.fillStyle='rgba(0,0,0,0.12)';for(let esy=0;esy<vh;esy+=3)oc.fillRect(0,esy,vw,1);}
    // Grain in export
    if(FX.grain>0){if(!grainCanvas){grainCanvas=document.createElement('canvas');grainCtx=grainCanvas.getContext('2d');}grainCanvas.width=vw/2;grainCanvas.height=vh/2;const egd=grainCtx.createImageData(grainCanvas.width,grainCanvas.height);const edd=egd.data;for(let ei=0;ei<edd.length;ei+=4){const ev=Math.random()*255;edd[ei]=edd[ei+1]=edd[ei+2]=ev;edd[ei+3]=255;}grainCtx.putImageData(egd,0,0);oc.save();oc.globalAlpha=FX.grain/300;oc.globalCompositeOperation='overlay';oc.drawImage(grainCanvas,0,0,vw,vh);oc.globalCompositeOperation='source-over';oc.restore();}
    // Highlight effect in export
    if(S.highlight&&sc2>1.05&&cursorPositions.length>0){
      const hx=((curX*vw-sx2)/sw2)*vw,hy=((curY*vh-sy2)/sh2)*vh;
      const str=S.highlightStrength*Math.min(1,sc2-1);
      const sr=Math.min(vw,vh)*0.35;
      const hg=oc.createRadialGradient(hx,hy,sr*0.3,hx,hy,sr*1.2);
      hg.addColorStop(0,'rgba(0,0,0,0)');hg.addColorStop(0.6,`rgba(0,0,0,${str*0.3})`);hg.addColorStop(1,`rgba(0,0,0,${str})`);
      oc.fillStyle=hg;oc.fillRect(0,0,vw,vh);
    }
    // Cursor in export
    if(S.cursorVisible&&cursorPositions.length>0){
      const cp2=getCursorAt(ms2);const ecx=((cp2.x*vw-sx2)/sw2)*vw,ecy=((cp2.y*vh-sy2)/sh2)*vh;
      if(ecx>=0&&ecx<=vw&&ecy>=0&&ecy<=vh){
        const cs2=40*S.cursorSize;oc.save();oc.translate(ecx,ecy);
        oc.beginPath();oc.moveTo(0,0);oc.lineTo(0,cs2*1.4);oc.lineTo(cs2*0.35,cs2*1.05);oc.lineTo(cs2*0.75,cs2*1.65);oc.lineTo(cs2*0.95,cs2*1.5);oc.lineTo(cs2*0.55,cs2*0.9);oc.lineTo(cs2*1.0,cs2*0.85);oc.closePath();
        oc.shadowColor='rgba(0,0,0,0.4)';oc.shadowBlur=6;oc.shadowOffsetX=2;oc.shadowOffsetY=2;
        oc.fillStyle='#fff';oc.fill();oc.shadowBlur=0;oc.strokeStyle='#000';oc.lineWidth=cs2*0.07;oc.stroke();oc.restore();
      }
      // Click ripple in export
      if (!scriptMode && cursorClicks.length > 0) {
        for (const ck of cursorClicks) {
          const elapsed = ms2 - ck.t;
          if (elapsed >= 0 && elapsed < 500) {
            const ckx = ((ck.x * vw - sx2) / sw2) * vw;
            const cky = ((ck.y * vh - sy2) / sh2) * vh;
            if (ckx >= 0 && ckx <= vw && cky >= 0 && cky <= vh) {
              const rp = elapsed / 500;
              oc.beginPath(); oc.arc(ckx, cky, 60 * rp * S.cursorSize, 0, Math.PI * 2);
              oc.strokeStyle = `rgba(124,111,245,${(1 - rp) * 0.7})`; oc.lineWidth = 4; oc.stroke();
              oc.beginPath(); oc.arc(ckx, cky, 30 * rp * S.cursorSize, 0, Math.PI * 2);
              oc.strokeStyle = `rgba(167,139,250,${(1 - rp) * 0.5})`; oc.lineWidth = 2; oc.stroke();
            }
          }
        }
      }
    }
    // Webcam in export
    if(hasWebcam&&S.webcamVisible&&webcamVideo.videoWidth>0){
      const wca=webcamVideo.videoWidth/webcamVideo.videoHeight,wcd=Math.min(vw,vh)*S.webcamSize;
      const wcW2=wca>=1?wcd:wcd*wca,wcH2=wca>=1?wcd/wca:wcd;
      const m2=vw*0.015,wcCX2=m2+(vw-m2*2)*S.webcamPosX,wcCY2=m2+(vh-m2*2)*S.webcamPosY;
      const wcX2=wcCX2-wcW2/2,wcY2=wcCY2-wcH2/2;
      oc.save();oc.globalAlpha=S.webcamOpacity;
      if(S.webcamShadow){oc.shadowColor='rgba(0,0,0,0.5)';oc.shadowBlur=24;oc.shadowOffsetY=6;}
      oc.beginPath();
      if(S.webcamShape==='circle')oc.arc(wcCX2,wcCY2,Math.min(wcW2,wcH2)/2,0,Math.PI*2);
      else if(S.webcamShape==='rounded')rrect(oc,wcX2,wcY2,wcW2,wcH2,Math.min(wcW2,wcH2)*0.15);
      else oc.rect(wcX2,wcY2,wcW2,wcH2);
      if(S.webcamBorder){oc.fillStyle=S.webcamBorderColor;oc.fill();oc.shadowColor='transparent';oc.shadowBlur=0;const bw2=S.webcamBorderWidth*2;oc.beginPath();
        if(S.webcamShape==='circle')oc.arc(wcCX2,wcCY2,Math.min(wcW2,wcH2)/2-bw2,0,Math.PI*2);
        else if(S.webcamShape==='rounded')rrect(oc,wcX2+bw2,wcY2+bw2,wcW2-bw2*2,wcH2-bw2*2,Math.max(0,Math.min(wcW2,wcH2)*0.15-bw2));
        else oc.rect(wcX2+bw2,wcY2+bw2,wcW2-bw2*2,wcH2-bw2*2);}
      oc.save();oc.clip();
      if(S.webcamFlip){oc.translate(wcCX2,wcCY2);oc.scale(-1,1);oc.translate(-wcCX2,-wcCY2);}
      const da2=S.webcamBorder?{x:wcX2+S.webcamBorderWidth*2,y:wcY2+S.webcamBorderWidth*2,w:wcW2-S.webcamBorderWidth*4,h:wcH2-S.webcamBorderWidth*4}:{x:wcX2,y:wcY2,w:wcW2,h:wcH2};
      const sa2=webcamVideo.videoWidth/webcamVideo.videoHeight,da2a=da2.w/da2.h;
      let esx,esy,esw,esh;
      if(sa2>da2a){esh=webcamVideo.videoHeight;esw=esh*da2a;esx=(webcamVideo.videoWidth-esw)/2;esy=0;}
      else{esw=webcamVideo.videoWidth;esh=esw/da2a;esx=0;esy=(webcamVideo.videoHeight-esh)/2;}
      oc.drawImage(webcamVideo,esx,esy,esw,esh,da2.x,da2.y,da2.w,da2.h);
      oc.restore();oc.restore();
    }
    subtitles.filter(s=>video.currentTime>=s.start&&video.currentTime<=s.end).forEach(sub=>{
      const fs2=S.subFontSize*2,py2=vh*(S.subPosY/100),cx3=vw/2;const a2=getSubAnim(sub,video.currentTime);
      oc.save();oc.font=`${S.subWeight} ${fs2}px -apple-system,sans-serif`;oc.textAlign='center';oc.textBaseline='middle';oc.globalAlpha=Math.max(0,(sub.anim==='fadeIn'||sub.anim==='slideUp'||sub.anim==='popIn')?a2.fi*a2.fo:1);
      sub.text.split('\n').forEach((l,i)=>{let dl=l;if(sub.anim==='typewriter')dl=l.substring(0,Math.floor(a2.p*l.length*1.5));const lh2=fs2*1.4,ly2=py2+i*lh2;
        if(S.subBg){const tw2=oc.measureText(dl).width;rrect(oc,cx3-tw2/2-20,ly2-lh2/2-6,tw2+40,lh2+12,(lh2+12)/2);oc.fillStyle=S.subBgColor+Math.round(S.subBgAlpha*255).toString(16).padStart(2,'0');oc.fill();}
        if(S.subOutline){oc.strokeStyle=S.subOutlineColor;oc.lineWidth=S.subOutlineWidth*2;oc.lineJoin='round';oc.strokeText(dl,cx3,ly2);}
        oc.fillStyle=S.subColor;oc.fillText(dl,cx3,ly2);});oc.restore();});
    // Annotations in export
    renderAnnotations(oc, video.currentTime, 0, 0, vw, vh, sx2, sy2, sw2, sh2, vw, vh);
    // Crop: copy cropped region to output canvas
    if (hasCrop && outOc) {
      outOc.clearRect(0, 0, expW, expH);
      outOc.drawImage(off, cropL, cropT, expW, expH, 0, 0, expW, expH);
    }
    // Apply segment speed during export
    const segSpd2 = getSegmentSpeedAt(video.currentTime);
    if (Math.abs(video.playbackRate - segSpd2) > 0.01) video.playbackRate = segSpd2;
    st.textContent=`내보내기 중... ${Math.round((video.currentTime-trimStart)/(trimEnd-trimStart)*100)}%`;
    requestAnimationFrame(ef);}
  ef();
}

// ═══════ Helpers ═══════
function fmtT(s){if(!isFinite(s)||isNaN(s))return '00:00.0';return `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}.${Math.floor((s%1)*10)}`;}
function exportFileName(ext){const d=new Date();const ts=`${d.getFullYear()}${(d.getMonth()+1).toString().padStart(2,'0')}${d.getDate().toString().padStart(2,'0')}_${d.getHours().toString().padStart(2,'0')}${d.getMinutes().toString().padStart(2,'0')}${d.getSeconds().toString().padStart(2,'0')}`;return `octo-${ts}.${ext}`;}

// ═══════ GIF Export ═══════
async function doExportGif(){
  const btn=$('exportBtn');const st=$('exportStatus');
  btn.disabled=true;st.textContent='GIF 준비 중...';

  const gifFps = parseInt($('gifFps')?.value || 15);
  const gifScale = parseFloat($('gifScale')?.value || 0.5);
  const gifQuality = parseInt($('gifQuality')?.value || 10);
  const vw = video.videoWidth, vh = video.videoHeight;

  const gw = Math.round(vw * gifScale);
  const gh = Math.round(vh * gifScale);
  const frameDelay = Math.round(1000 / gifFps);

  const off = document.createElement('canvas');
  const oc = off.getContext('2d');
  off.width = gw; off.height = gh;

  // Collect frames by stepping through the video
  const frames = [];
  const duration = trimEnd - trimStart;
  const totalFrames = Math.ceil(duration * gifFps);

  st.textContent = `프레임 캡처 중... 0/${totalFrames}`;

  // Reset zoom state
  curX = 0.5; curY = 0.5; curScale = 1; zoomTransition.active = false;

  for (let i = 0; i < totalFrames; i++) {
    const t = trimStart + (i / gifFps);
    video.currentTime = t;
    await new Promise(r => { video.onseeked = r; });
    // Small delay for frame to render
    await new Promise(r => setTimeout(r, 30));

    // Update zoom state
    const ms = t * 1000;
    const zTg=computeZoomTarget(ms);
    startZoomTransition(ms, zTg.scale, zTg.x, zTg.y);
    applyZoomTransition(ms);

    const sc=curScale,sW=vw/sc,sH=vh/sc;
    let sX=curX*vw-sW/2,sY=curY*vh-sH/2;
    sX=Math.max(0,Math.min(vw-sW,sX));sY=Math.max(0,Math.min(vh-sH,sY));

    oc.clearRect(0,0,gw,gh);
    const gfp=filterPresets[activeFilter]||filterPresets.none;
    let gfs=`brightness(${S.brightness*gfp.brightness}) contrast(${S.contrast*gfp.contrast}) saturate(${S.saturate*gfp.saturate})`;
    if(gfp.hueRotate)gfs+=` hue-rotate(${gfp.hueRotate}deg)`;
    if(gfp.sepia)gfs+=` sepia(${gfp.sepia})`;
    oc.filter=gfs;oc.drawImage(video,sX,sY,sW,sH,0,0,gw,gh);oc.filter='none';
    if(gfp.overlay){oc.fillStyle=gfp.overlay;oc.fillRect(0,0,gw,gh);}
    if(FX.temperature!==0){oc.fillStyle=FX.temperature>0?`rgba(255,140,0,${Math.abs(FX.temperature)/400})`:`rgba(0,100,255,${Math.abs(FX.temperature)/400})`;oc.fillRect(0,0,gw,gh);}
    if(FX.vignette>0){const gvcx=gw/2,gvcy=gh/2,gvr=Math.max(gw,gh)*0.7;const gvg=oc.createRadialGradient(gvcx,gvcy,gvr*0.3,gvcx,gvcy,gvr);gvg.addColorStop(0,'rgba(0,0,0,0)');gvg.addColorStop(1,`rgba(0,0,0,${FX.vignette/100})`);oc.fillStyle=gvg;oc.fillRect(0,0,gw,gh);}
    if(FX.fadeAmount>0){oc.fillStyle=`rgba(128,128,128,${FX.fadeAmount/200})`;oc.fillRect(0,0,gw,gh);}

    // Highlight effect in GIF export
    if(S.highlight&&sc>1.05&&cursorPositions.length>0){
      const hx=((curX*vw-sX)/sW)*gw,hy=((curY*vh-sY)/sH)*gh;
      const str=S.highlightStrength*Math.min(1,sc-1);
      const sr=Math.min(gw,gh)*0.35;
      const hg=oc.createRadialGradient(hx,hy,sr*0.3,hx,hy,sr*1.2);
      hg.addColorStop(0,'rgba(0,0,0,0)');hg.addColorStop(0.6,`rgba(0,0,0,${str*0.3})`);hg.addColorStop(1,`rgba(0,0,0,${str})`);
      oc.fillStyle=hg;oc.fillRect(0,0,gw,gh);
    }

    // Cursor in GIF
    if(S.cursorVisible&&cursorPositions.length>0){
      const cpg=getCursorAt(ms);const gcx=((cpg.x*vw-sX)/sW)*gw,gcy=((cpg.y*vh-sY)/sH)*gh;
      if(gcx>=0&&gcx<=gw&&gcy>=0&&gcy<=gh){
        const gcs=20*S.cursorSize*gifScale;oc.save();oc.translate(gcx,gcy);
        oc.beginPath();oc.moveTo(0,0);oc.lineTo(0,gcs*1.4);oc.lineTo(gcs*0.35,gcs*1.05);oc.lineTo(gcs*0.75,gcs*1.65);oc.lineTo(gcs*0.95,gcs*1.5);oc.lineTo(gcs*0.55,gcs*0.9);oc.lineTo(gcs*1.0,gcs*0.85);oc.closePath();
        oc.fillStyle='#fff';oc.fill();oc.strokeStyle='#000';oc.lineWidth=gcs*0.07;oc.stroke();oc.restore();
      }
    }
    // Webcam in GIF
    if(hasWebcam&&S.webcamVisible&&webcamVideo.videoWidth>0){
      webcamVideo.currentTime=t;
      const wca=webcamVideo.videoWidth/webcamVideo.videoHeight,wcd=Math.min(gw,gh)*S.webcamSize;
      const wcWg=wca>=1?wcd:wcd*wca,wcHg=wca>=1?wcd/wca:wcd;
      const mg=gw*0.015,wcCXg=mg+(gw-mg*2)*S.webcamPosX,wcCYg=mg+(gh-mg*2)*S.webcamPosY;
      const wcXg=wcCXg-wcWg/2,wcYg=wcCYg-wcHg/2;
      oc.save();oc.globalAlpha=S.webcamOpacity;oc.beginPath();
      if(S.webcamShape==='circle')oc.arc(wcCXg,wcCYg,Math.min(wcWg,wcHg)/2,0,Math.PI*2);
      else if(S.webcamShape==='rounded')rrect(oc,wcXg,wcYg,wcWg,wcHg,Math.min(wcWg,wcHg)*0.15);
      else oc.rect(wcXg,wcYg,wcWg,wcHg);
      if(S.webcamBorder){oc.fillStyle=S.webcamBorderColor;oc.fill();const bwg=S.webcamBorderWidth*gifScale;oc.beginPath();
        if(S.webcamShape==='circle')oc.arc(wcCXg,wcCYg,Math.min(wcWg,wcHg)/2-bwg,0,Math.PI*2);
        else if(S.webcamShape==='rounded')rrect(oc,wcXg+bwg,wcYg+bwg,wcWg-bwg*2,wcHg-bwg*2,Math.max(0,Math.min(wcWg,wcHg)*0.15-bwg));
        else oc.rect(wcXg+bwg,wcYg+bwg,wcWg-bwg*2,wcHg-bwg*2);}
      oc.save();oc.clip();
      if(S.webcamFlip){oc.translate(wcCXg,wcCYg);oc.scale(-1,1);oc.translate(-wcCXg,-wcCYg);}
      const dag=S.webcamBorder?{x:wcXg+S.webcamBorderWidth*gifScale,y:wcYg+S.webcamBorderWidth*gifScale,w:wcWg-S.webcamBorderWidth*gifScale*2,h:wcHg-S.webcamBorderWidth*gifScale*2}:{x:wcXg,y:wcYg,w:wcWg,h:wcHg};
      const sag=webcamVideo.videoWidth/webcamVideo.videoHeight,daga=dag.w/dag.h;
      let gssx,gssy,gssw,gssh;
      if(sag>daga){gssh=webcamVideo.videoHeight;gssw=gssh*daga;gssx=(webcamVideo.videoWidth-gssw)/2;gssy=0;}
      else{gssw=webcamVideo.videoWidth;gssh=gssw/daga;gssx=0;gssy=(webcamVideo.videoHeight-gssh)/2;}
      oc.drawImage(webcamVideo,gssx,gssy,gssw,gssh,dag.x,dag.y,dag.w,dag.h);
      oc.restore();oc.restore();
    }
    // Subtitles
    subtitles.filter(s=>t>=s.start&&t<=s.end).forEach(sub=>{
      const fs=S.subFontSize*gifScale;const py=gh*(S.subPosY/100);const cx2=gw/2;
      const a=getSubAnim(sub,t);
      oc.save();oc.font=`${S.subWeight} ${fs}px -apple-system,sans-serif`;
      oc.textAlign='center';oc.textBaseline='middle';
      oc.globalAlpha=Math.max(0,(sub.anim==='fadeIn'||sub.anim==='slideUp'||sub.anim==='popIn')?a.fi*a.fo:1);
      sub.text.split('\n').forEach((l,li)=>{
        let dl=l;if(sub.anim==='typewriter')dl=l.substring(0,Math.floor(a.p*l.length*1.5));
        const lh=fs*1.4,ly=py+li*lh;
        if(S.subBg){const tw=oc.measureText(dl).width;rrect(oc,cx2-tw/2-8,ly-lh/2-3,tw+16,lh+6,(lh+6)/2);oc.fillStyle=S.subBgColor+Math.round(S.subBgAlpha*255).toString(16).padStart(2,'0');oc.fill();}
        if(S.subOutline){oc.strokeStyle=S.subOutlineColor;oc.lineWidth=S.subOutlineWidth*gifScale;oc.lineJoin='round';oc.strokeText(dl,cx2,ly);}
        oc.fillStyle=S.subColor;oc.fillText(dl,cx2,ly);
      });
      oc.restore();
    });
    // Annotations in GIF export
    renderAnnotations(oc, t, 0, 0, gw, gh, sX, sY, sW, sH, vw, vh);

    // Capture frame data
    frames.push(oc.getImageData(0, 0, gw, gh));
    st.textContent = `프레임 캡처 중... ${i+1}/${totalFrames}`;
  }

  // Encode GIF using gif.js
  st.textContent = 'GIF 인코딩 중...';

  const gif = new GIF({
    workers: 2,
    quality: gifQuality,
    width: gw,
    height: gh,
    workerScript: './node_modules/gif.js/dist/gif.worker.js',
  });

  frames.forEach(frame => {
    gif.addFrame(frame, { delay: frameDelay });
  });

  gif.on('progress', p => {
    st.textContent = `GIF 인코딩 중... ${Math.round(p * 100)}%`;
  });

  gif.on('finished', async (blob) => {
    const buf = await blob.arrayBuffer();
    const fp = await window.electronAPI.saveVideoDialog(exportFileName('gif'));
    if (fp) {
      await window.electronAPI.writeFile({ filePath: fp, buffer: buf });
      st.textContent = 'GIF 저장 완료!';
    } else {
      st.textContent = '취소됨';
    }
    btn.disabled = false;
    setTimeout(() => { st.textContent = ''; }, 3000);
  });

  gif.render();
}

// Init
try {
  showToolProps('zoom');
  // Save initial state for undo
  saveState();
  console.log('Editor initialized OK');
} catch(e) {
  console.error('INIT ERROR:', e.message, e.stack);
}

// Global error handler
window.onerror = (msg, src, line, col, err) => {
  console.error('RUNTIME ERROR:', msg, 'line:', line, err?.stack);
};
window.onunhandledrejection = (e) => {
  console.error('PROMISE ERROR:', e.reason);
};
</script>
